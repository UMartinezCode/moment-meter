<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Moment Meter</title>
<meta name="description" content="Track your time, understand your days.">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Moment Meter">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0f1115">
<style>
:root{
  --bg:#f2f2f7; --card:#ffffff; --card2:#f7f7fa; --text:#111318; --text2:#6b7280;
  --line:rgba(0,0,0,.07); --accent:#5b5bd6; --accent2:#7c6ff0;
  --danger:#e5484d; --ok:#30a46c; --shadow:0 1px 2px rgba(16,18,27,.05),0 8px 24px rgba(16,18,27,.06);
  --blur-bg:rgba(248,248,251,.82);
}
[data-theme="dark"]{
  --bg:#0f1115; --card:#1a1d24; --card2:#232732; --text:#f2f3f7; --text2:#9aa1ae;
  --line:rgba(255,255,255,.08); --accent:#7c7cf5; --accent2:#9a8ef7;
  --danger:#ff6369; --ok:#3dd68c; --shadow:0 1px 2px rgba(0,0,0,.35),0 8px 24px rgba(0,0,0,.35);
  --blur-bg:rgba(15,17,21,.82);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--text); min-height:100%;
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  transition:background .25s,color .25s;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,select,textarea{font:inherit;color:var(--text)}
::selection{background:var(--accent);color:#fff}

/* ---------- layout ---------- */
#app{
  max-width:640px;margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom));
  min-height:100vh;min-height:100dvh;box-sizing:border-box;
}
header.top{
  position:sticky;top:0;z-index:30;margin:0 -16px;padding:calc(10px + env(safe-area-inset-top)) 20px 10px;
  background:var(--blur-bg);-webkit-backdrop-filter:saturate(1.6) blur(18px);backdrop-filter:saturate(1.6) blur(18px);
  display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);
}
header.top h1{font-size:26px;font-weight:800;letter-spacing:-.02em}
.hbtn{
  width:38px;height:38px;border-radius:999px;display:grid;place-items:center;
  background:var(--card);box-shadow:var(--shadow);font-size:20px;font-weight:600;color:var(--accent);
  transition:transform .12s;
}
.hbtn:active{transform:scale(.9)}
.top-right{display:flex;align-items:center;gap:8px}
.syncpill{
  display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 11px;border-radius:999px;
  background:var(--card);box-shadow:var(--shadow);font-size:12px;font-weight:700;color:var(--text2);
  white-space:nowrap;transition:transform .12s,color .2s;max-width:150px;overflow:hidden;
}
.syncpill:active{transform:scale(.92)}
.syncpill .sdot{width:8px;height:8px;border-radius:99px;background:currentColor;flex:none}
.syncpill.ok{color:var(--ok)}
.syncpill.syncing{color:var(--accent)}
.syncpill.syncing .sdot{animation:pulse 1.1s infinite}
.syncpill.warn{color:#d9a400}
.syncpill.err{color:var(--danger)}
.syncpill .stxt{overflow:hidden;text-overflow:ellipsis}
.view{display:none;padding-top:16px;animation:fadeUp .25s ease}
.view.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- tab bar ---------- */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  display:flex;justify-content:space-around;align-items:stretch;
  max-width:640px;margin:0 auto;
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  background:var(--blur-bg);-webkit-backdrop-filter:saturate(1.6) blur(18px);backdrop-filter:saturate(1.6) blur(18px);
  border-top:1px solid var(--line);
}
nav.tabs button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 0 4px;color:var(--text2);font-size:10.5px;font-weight:600;border-radius:12px;
  transition:color .15s;
}
nav.tabs button svg{width:24px;height:24px}
nav.tabs button.on{color:var(--accent)}
nav.tabs button:active{transform:scale(.94)}

/* ---------- track grid ---------- */
.fam{margin-top:18px}
.fam:first-of-type{margin-top:4px}
.fam-h{
  display:flex;align-items:center;gap:8px;margin:0 4px 9px;cursor:pointer;user-select:none;
}
.fam-h .fdot{width:9px;height:9px;border-radius:99px;background:var(--fc);flex:none}
.fam-h .fname{font-size:12.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--fc)}
.fam-h .fmeta{font-size:11.5px;font-weight:600;color:var(--text2);font-variant-numeric:tabular-nums}
.fam-h .fedit{margin-left:auto;color:var(--text2);opacity:.5;font-size:13px;font-weight:700}
.fam-h:active{opacity:.6}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cat{
  position:relative;background:var(--card);border-radius:14px;padding:11px 12px 11px 15px;
  box-shadow:var(--shadow);min-height:62px;display:flex;flex-direction:column;justify-content:center;gap:3px;
  overflow:hidden;transition:transform .12s;user-select:none;-webkit-user-select:none;
}
@supports (background: color-mix(in srgb, red 8%, white)){
  .cat{background:color-mix(in srgb, var(--c) 7%, var(--card))}
  .cat.running{background:color-mix(in srgb, var(--c) 15%, var(--card))}
}
.cat:active{transform:scale(.96)}
.cat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4.5px;background:var(--c)}
.cat.running{outline:2px solid var(--c);outline-offset:-2px}
.cat .nm{font-weight:700;font-size:14.5px;line-height:1.2;padding-right:16px;word-break:break-word}
.cat .tm{font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums;font-weight:600}
.cat.running .tm{color:var(--c);font-size:15px;font-weight:800}
.cat .dot{position:absolute;right:10px;top:10px;width:7px;height:7px;border-radius:99px;background:var(--c);opacity:0;transition:opacity .2s}
.cat.running .dot{opacity:1;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.7);opacity:.45}}
.cat .edit{
  position:absolute;right:3px;bottom:3px;width:26px;height:26px;border-radius:99px;
  display:grid;place-items:center;color:var(--text2);font-size:14px;opacity:.55;
}
.addcat{
  border:1.5px dashed var(--line);border-radius:14px;min-height:62px;display:grid;place-items:center;
  color:var(--text2);font-weight:700;font-size:13px;grid-column:1 / -1;
}
.today-strip{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:20px;
  padding:16px 18px 14px;margin-bottom:16px;box-shadow:var(--shadow);
}
.today-strip::after{content:"";position:absolute;top:-40%;right:-10%;width:55%;height:180%;
  background:radial-gradient(closest-side,rgba(255,255,255,.16),transparent);pointer-events:none}
.today-strip .row{display:flex;justify-content:space-between;align-items:center}
.today-strip .big{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.today-strip .lbl{font-size:12.5px;opacity:.85;font-weight:600}
.today-strip .ring{font-size:30px}
.mixbar{display:flex;height:7px;border-radius:99px;overflow:hidden;margin-top:12px;background:rgba(255,255,255,.22)}
.mixbar span{height:100%}

/* ---------- events log ---------- */
.day-h{
  display:flex;justify-content:space-between;align-items:baseline;
  margin:20px 4px 8px;font-size:13px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.04em;
}
.evcard{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.ev{
  display:flex;align-items:center;gap:12px;padding:12px 14px;position:relative;
  border-bottom:1px solid var(--line);transition:background .15s;
}
.ev:last-child{border-bottom:0}
.ev:active{background:var(--card2)}
.ev .bar{width:4.5px;align-self:stretch;border-radius:99px;background:var(--c);flex:none}
.ev .mid{flex:1;min-width:0}
.ev .t1{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev .t2{font-size:12.5px;color:var(--text2);margin-top:1px}
.ev .dur{font-weight:700;font-size:14px;color:var(--accent);font-variant-numeric:tabular-nums;flex:none}
.empty{
  text-align:center;color:var(--text2);padding:56px 24px;font-size:14.5px;line-height:1.6;
}
.empty .big{font-size:40px;margin-bottom:10px}

/* ---------- stats ---------- */
.seg{
  display:flex;background:var(--card2);border-radius:12px;padding:3px;margin-bottom:14px;
  border:1px solid var(--line);
}
.seg button{flex:1;padding:7px 0;border-radius:9px;font-size:13.5px;font-weight:700;color:var(--text2)}
.seg button.on{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
.rangenav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.rangenav .lab{font-weight:800;font-size:16px}
.rangenav .sub{font-size:12.5px;color:var(--text2);font-weight:600;text-align:center}
.rangenav button{
  width:36px;height:36px;border-radius:99px;background:var(--card);box-shadow:var(--shadow);
  display:grid;place-items:center;color:var(--accent);font-size:17px;font-weight:800;
}
.rangenav button:disabled{opacity:.35}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:none;padding:6px 13px;border-radius:99px;font-size:12.5px;font-weight:700;
  background:var(--card);box-shadow:var(--shadow);color:var(--text2);border:1.5px solid transparent;
}
.chip.on{color:var(--c);border-color:var(--c)}
.chip .cd{display:inline-block;width:8px;height:8px;border-radius:99px;background:var(--c);margin-right:6px}
.panel{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.panel h3{font-size:13px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
canvas{width:100%;display:block}
.tl-strip{position:relative;height:64px;background:var(--card2);border-radius:12px;overflow:hidden}
.tl-strip .blk{position:absolute;top:8px;bottom:8px;border-radius:5px;min-width:2px;opacity:.95}
.tl-hours{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text2);margin-top:6px;font-weight:600}
.chartinfo{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13.5px;color:var(--text2);font-weight:600;min-height:20px}
.chartinfo .cd{width:10px;height:10px;border-radius:99px;flex:none}
.chartinfo b{color:var(--text);font-weight:800}
.tl-strip .blk{cursor:pointer}
#pieCv,#barCv{cursor:pointer}
.gaprow{
  display:flex;justify-content:space-between;align-items:center;width:100%;
  padding:11px 2px;border-bottom:1px solid var(--line);font-size:14px;font-weight:600;
  color:var(--text);text-align:left;
}
.gaprow:last-of-type{border-bottom:0}
.gaprow:active{background:var(--card2)}
.gaprow .gd{color:var(--accent);font-weight:700;font-size:13px;white-space:nowrap}
.delta{font-size:12.5px;font-weight:800;margin-right:8px;white-space:nowrap;font-variant-numeric:tabular-nums}
.tot{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line)}
.tot:last-child{border-bottom:0}
.tot .cd{width:10px;height:10px;border-radius:99px;background:var(--c);flex:none}
.tot .nm{flex:1;font-weight:600;font-size:14.5px}
.tot .pc{font-size:12px;color:var(--text2);font-weight:600;margin-right:8px}
.tot .d{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}

/* ---------- goals ---------- */
.goal{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:15px 16px;margin-bottom:12px;position:relative}
.goal:active{transform:scale(.985)}
.goal .row1{display:flex;align-items:center;gap:9px;margin-bottom:3px}
.goal .cd{width:10px;height:10px;border-radius:99px;background:var(--c)}
.goal .nm{font-weight:700;font-size:15.5px;flex:1}
.goal .per{font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;background:var(--card2);padding:3px 8px;border-radius:99px}
.goal .nums{display:flex;justify-content:space-between;font-size:12.5px;color:var(--text2);font-weight:600;margin:7px 0 7px;font-variant-numeric:tabular-nums}
.goal .bar{height:9px;background:var(--card2);border-radius:99px;overflow:hidden}
.goal .fill{height:100%;border-radius:99px;background:var(--c);transition:width .5s cubic-bezier(.22,1,.36,1)}
.goal.done .fill{background:linear-gradient(90deg,var(--c),var(--ok))}
.goal .check{position:absolute;top:14px;right:14px;color:var(--ok);font-weight:900;font-size:16px;animation:pop .4s}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}

/* ---------- settings ---------- */
.slist{background:var(--card);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.srow{
  display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);
  font-size:15px;font-weight:600;width:100%;text-align:left;
}
.srow:last-child{border-bottom:0}
.srow:active{background:var(--card2)}
.srow .ic{width:30px;height:30px;border-radius:8.5px;display:grid;place-items:center;font-size:15px;color:#fff;flex:none}
.srow .grow{flex:1}
.srow .val{color:var(--text2);font-size:13.5px;font-weight:600}
.srow.danger{color:var(--danger)}
.sect{font-size:12.5px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:4px 6px 8px}

/* ---------- modal / sheet ---------- */
.backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s;
}
.backdrop.on{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:100;max-width:640px;margin:0 auto;
  background:var(--card);border-radius:24px 24px 0 0;box-shadow:0 -12px 40px rgba(0,0,0,.25);
  transform:translateY(105%);transition:transform .32s cubic-bezier(.22,1,.36,1);
  padding:10px 20px calc(24px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.sheet.on{transform:none}
.sheet .grab{width:38px;height:5px;border-radius:99px;background:var(--line);margin:2px auto 14px}
.sheet h2{font-size:19px;font-weight:800;margin-bottom:16px;letter-spacing:-.01em}
.frow{margin-bottom:14px}
.frow label{display:block;font-size:12.5px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.frow input[type=text],.frow input[type=datetime-local],.frow input[type=number],.frow select,.frow textarea{
  width:100%;background:var(--card2);border:1.5px solid var(--line);border-radius:12px;
  padding:11px 13px;font-size:16px;outline:none;transition:border-color .15s;
  -webkit-appearance:none;appearance:none;
}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--accent)}
.frow .duo{display:flex;gap:10px}
.frow .duo>*{flex:1}
.swatches{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.sw{aspect-ratio:1;border-radius:10px;position:relative;transition:transform .12s}
.sw:active{transform:scale(.85)}
.sw.on{outline:2.5px solid var(--text);outline-offset:2px}
.sw.on::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-weight:900;font-size:14px}
.btn{
  width:100%;padding:14px;border-radius:14px;font-weight:800;font-size:16px;text-align:center;
  background:var(--accent);color:#fff;margin-top:6px;transition:transform .12s,opacity .15s;
}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--card2);color:var(--text)}
.btn.red{background:transparent;color:var(--danger);font-weight:700}
.btn:disabled{opacity:.4}
.seg.mini{margin:0}
/* toast */
#toast{
  position:fixed;left:50%;bottom:calc(104px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--text);color:var(--bg);padding:10px 18px;border-radius:99px;font-size:13.5px;font-weight:700;
  opacity:0;pointer-events:none;transition:.3s;z-index:200;white-space:nowrap;box-shadow:var(--shadow);
}
#toast.on{opacity:1;transform:translateX(-50%)}
.hint{font-size:12.5px;color:var(--text2);line-height:1.55;margin-top:8px}
.shortcut-box{background:var(--card2);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.7;margin-top:8px}
.shortcut-box code{background:var(--card);padding:2px 7px;border-radius:6px;font-size:12px;border:1px solid var(--line)}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <h1 id="viewTitle">Track</h1>
    <div class="top-right">
      <button class="syncpill" id="syncPill" hidden aria-label="Sync status"></button>
      <button class="hbtn" id="headerBtn" aria-label="Add">＋</button>
    </div>
  </header>

  <main>
    <section class="view" id="view-track"></section>
    <section class="view" id="view-log"></section>
    <section class="view" id="view-stats"></section>
    <section class="view" id="view-goals"></section>
    <section class="view" id="view-settings"></section>
  </main>
</div>

<nav class="tabs" id="tabs">
  <button data-v="track" class="on">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
    Track
  </button>
  <button data-v="log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg>
    Log
  </button>
  <button data-v="stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
    Stats
  </button>
  <button data-v="goals">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
    Goals
  </button>
  <button data-v="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
    Settings
  </button>
</nav>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet"></div>
<div id="toast"></div>

<script>
"use strict";
/* ============================== state ============================== */
const LS_KEY = "momentmeter_v1";
const APP_BUILD = "build 2026-07-22d (families)";   /* bump when deploying; shown in Settings */
/* picker palette: 8 hue columns × 4 shades, matching the app's family ramps */
const SWATCHES = [
  "#a32c2c","#b84a10","#8f6a12","#166b3f","#0b5f58","#1c4fae","#3d2f8f","#a12775",

/* the exports contain durations, not start/end times — lay each day out in a natural order */
const PLACE_ORDER = ["Sleep","Grooming","Yoga","Meditation","Exercising","Commuting","Lecture",
  "Clinical Training","Volunteer Service","Studying","FP","Shopping","Housekeeping","Reduce Entropy",
  "Cooking","Eating","My Health","Reading","Leisure","Socializing","YouTube","Bed & Brainrot"];
function hms(s){
  if(!/^\d+:\d{1,2}(:\d{1,2})?$/.test(String(s).trim())) return 0;
  const p = String(s).trim().split(":").map(Number);
  return (p[0]*3600 + p[1]*60 + (p[2]||0)) * 1000;
}
/* sequential placement from midnight; if a day exceeds 24h (parallel timers), the
   overflow events are pinned to end at midnight and overlap — daily totals stay exact */
function layoutDay(dayStart, durs, resolveCat){
  const D = 86400000, out = [];
  const names = [...PLACE_ORDER.filter(n=>durs[n]), ...Object.keys(durs).filter(n=>!PLACE_ORDER.includes(n))];
  let cur = dayStart;
  for(const n of names){
    const c = resolveCat(n); if(!c) continue;
    const d = durs[n];
    let s = cur, e = s + d;
    if(e > dayStart + D){ e = dayStart + D; s = Math.max(dayStart, e - d); }
    out.push({id:uid(), catId:c.id, name:"", start:s, end:e, notes:""});
    cur = e;
  }
  return out;
}
function makeSeed(){
  const categories = sortCats(SEED_CATS
    .filter(([name])=>!CAT_ALIAS[name.toLowerCase()])
    .map(([name,color])=>({id:uid(), name, color, archived:false})));
  const byName = {}; categories.forEach(c=>byName[c.name]=c);
  const events = [];
  for(const [dstr, vals] of Object.entries(SEED_DAYS)){
    const [y,m,dd] = dstr.split("-").map(Number);
    const dayStart = new Date(y, m-1, dd).getTime();
    const durs = {};
    vals.forEach((v,i)=>{
      const ms = hms(v);
      if(ms>0){ const nm = aliasName(SEED_CATS[i][0]); durs[nm] = (durs[nm]||0)+ms; }
    });
    events.push(...layoutDay(dayStart, durs, n=>byName[n]));
  }
  return { categories, events, timers:[], goals:[], deleted:[], deletedCats:[], deletedKeys:[], settings:{theme:"auto", colorTheme:"v12"} };
}
/* untouched installs from previous versions get upgraded to the real dataset */
function isPristineOldInstall(d){
  if(!d || !Array.isArray(d.categories)) return true;
  const OLD6 = ["Work","Study","Exercise","Social","Reading","Rest"];
  const DEMO9 = ["Work","Freelancing","Hobbies","Exercise","Socializing","Studying","Side project","Commuting","Reading"];
  const names = d.categories.map(x=>x.name);
  if(names.length===6 && names.every(n=>OLD6.includes(n)) && !(d.events||[]).length) return true;
  if(names.length===9 && names.every(n=>DEMO9.includes(n))) return true;   // demo dataset → real data
  return false;
}
let S = load();
function load(){
  let raw = null;
  try{
    raw = localStorage.getItem(LS_KEY);
    if(raw){
      const d = JSON.parse(raw);
      /* shape must be an object with array categories+events; otherwise treat as corrupt */
      if(!d || typeof d!=="object" || !Array.isArray(d.categories) || !Array.isArray(d.events) || isPristineOldInstall(d)){
        if(d && typeof d==="object" && (d.categories!=null || d.events!=null))
          try{ localStorage.setItem(LS_KEY+"_corrupt", raw); }catch(e2){}
        return makeSeed();
      }
      /* drop any malformed rows rather than trusting every field */
      d.categories = d.categories.filter(c=>c && typeof c==="object" && typeof c.id==="string" && typeof c.name==="string");
      d.events = d.events.filter(e=>e && typeof e==="object" && typeof e.catId==="string"
        && Number.isFinite(e.start) && Number.isFinite(e.end) && e.end>e.start);
      d.timers = (Array.isArray(d.timers)?d.timers:[]).filter(t=>t && typeof t.catId==="string" && Number.isFinite(t.start));
      d.goals = (Array.isArray(d.goals)?d.goals:[]).filter(g=>g && typeof g.catId==="string" && Number.isFinite(g.target));
      d.settings = (d.settings && typeof d.settings==="object") ? d.settings : {theme:"auto"};
      d.deleted = Array.isArray(d.deleted)?d.deleted:[];
      d.deletedCats = Array.isArray(d.deletedCats)?d.deletedCats:[];
      d.deletedKeys = Array.isArray(d.deletedKeys)?d.deletedKeys:[];
      if(!d.categories.length) return makeSeed();   /* nothing usable left */
      /* one-time migration: themed colors, expanded set, family-grouped layout */
      if(d.settings.colorTheme !== "v12"){
        /* fold retired categories into their replacements, moving all data across */
        for(const [srcLower, tgtName] of Object.entries(CAT_ALIAS)){
          const src = d.categories.find(x=>x.name.toLowerCase()===srcLower);
          if(!src) continue;
          let tgt = d.categories.find(x=>x.name.toLowerCase()===tgtName.toLowerCase());
          if(!tgt){
            const known = SEED_CATS.find(([n])=>n.toLowerCase()===tgtName.toLowerCase());
            tgt = {id:uid(), name:tgtName, color:known?known[1]:PALETTE[0], archived:false};
            d.categories.push(tgt);
          }
          for(const ev of d.events) if(ev.catId===src.id) ev.catId = tgt.id;
          for(const g of d.goals) if(g.catId===src.id) g.catId = tgt.id;
          for(const t of d.timers) if(t.catId===src.id) t.catId = tgt.id;
          d.categories = d.categories.filter(x=>x.id!==src.id);
        }
        for(const [n,col] of SEED_CATS){
          if(CAT_ALIAS[n.toLowerCase()]) continue;
          const c = d.categories.find(x=>x.name.toLowerCase()===n.toLowerCase());
          if(c) c.color = col;
          else d.categories.push({id:uid(), name:n, color:col, archived:false});
        }
        sortCats(d.categories);
        d.settings.colorTheme = "v12";
      }
      return d;
    }
  }catch(e){
    /* invalid JSON: preserve the broken payload for manual recovery, then reseed */
    if(raw) try{ localStorage.setItem(LS_KEY+"_corrupt", raw); }catch(e2){}
  }
  return makeSeed();
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }
  catch(e){
    if(!save._warned){ save._warned = true; toast("⚠ Storage full — export a backup, then delete old events"); }
  }
  /* any user change schedules a debounced push (unless we're mid-sync) so edits
     propagate on their own, without waiting to switch apps */
  if(typeof scheduleAutoPush==="function" && S.settings && S.settings.sync && !window.__inSync) scheduleAutoPush();
}

/* ============================== utils ============================== */
const $ = s => document.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const MIN = 60000, HOUR = 3600000, DAY = 86400000;

function fmtDur(ms){
  ms = Math.max(0, ms||0);
  const m = Math.round(ms/MIN);
  if(m < 60) return m + "m";
  const h = Math.floor(m/60);
  return h + "h " + (m%60) + "m";
}
function fmtClock(ms){
  const s = Math.floor(Math.max(0, ms||0)/1000);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  const p = n => String(n).padStart(2,"0");
  return h + ":" + p(m) + ":" + p(sec);
}
function fmtTime(ts){
  return new Date(ts).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
}
function fmtDay(ts){
  const d = new Date(ts), today = startOfDay(Date.now());
  const sd = startOfDay(ts);
  if(sd===today) return "Today";
  if(sd===today-DAY) return "Yesterday";
  return d.toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});
}
function startOfDay(ts){ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function startOfWeek(ts){ const d=new Date(startOfDay(ts)); const dow=(d.getDay()+6)%7; return d.getTime()-dow*DAY; }
function startOfMonth(ts){ const d=new Date(ts); d.setHours(0,0,0,0); d.setDate(1); return d.getTime(); }
function endOfMonth(ts){ const d=new Date(startOfMonth(ts)); d.setMonth(d.getMonth()+1); return d.getTime(); }
function toLocalInput(ts){
  const d = new Date(ts);
  const p = n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes());
}
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("on");
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove("on"), 2200);
}
/* overlap of event [s,e) with range [a,b) */
const overlap = (s,e,a,b) => Math.max(0, Math.min(e,b) - Math.max(s,a));

/* totals per category within [a,b), incl. running timers */
function totals(a,b,filterSet){
  const map = {};
  for(const ev of S.events){
    if(filterSet && !filterSet.has(ev.catId)) continue;
    const o = overlap(ev.start, ev.end, a, b);
    if(o>0) map[ev.catId] = (map[ev.catId]||0)+o;
  }
  const now = Date.now();
  for(const t of S.timers){
    if(filterSet && !filterSet.has(t.catId)) continue;
    const o = overlap(t.start, now, a, b);
    if(o>0) map[t.catId] = (map[t.catId]||0)+o;
  }
  return map;
}
const sumVals = m => Object.values(m).reduce((x,y)=>x+y,0);

/* ============================== timers ============================== */
function timerFor(catId){ return S.timers.find(t=>t.catId===catId); }
function startTimer(catId){
  if(timerFor(catId)) return;
  /* switch mode (default on): starting a category stops whatever else is running */
  if(S.settings.switchMode !== false) [...S.timers].forEach(t=>stopTimer(t.catId));
  S.timers.push({catId, start:Date.now()});
  save(); renderTrack();
}
function stopTimer(catId, silent){
  const i = S.timers.findIndex(t=>t.catId===catId);
  if(i<0) return;
  const t = S.timers[i];
  S.timers.splice(i,1);
  const dur = Date.now() - t.start;
  if(dur >= 30000){
    S.events.push({id:uid(), catId:t.catId, name:"", start:t.start, end:Date.now(), notes:""});
    if(!silent) toast(catName(t.catId) + " · " + fmtDur(dur) + " logged");
  } else if(!silent){
    toast("Under 30s — not logged");
  }
  save(); renderTrack(); checkGoalCelebrate();
}
function toggleTimer(catId){
  timerFor(catId) ? stopTimer(catId) : startTimer(catId);
}

/* ============================== track view ============================== */
function renderTrack(){
  const v = $("#view-track");
  const dayMap = totals(startOfDay(Date.now()), startOfDay(Date.now())+DAY);
  const dayTotal = sumVals(dayMap);
  const mix = Object.entries(dayMap).sort((a,b)=>b[1]-a[1])
    .map(([cid,ms])=>`<span style="width:${(ms/dayTotal*100)}%;background:${catColor(cid)}"></span>`).join("");
  let h = `
    <div class="today-strip">
      <div class="row">
        <div>
          <div class="lbl">Tracked today</div>
          <div class="big" id="todayTotal">${fmtDur(dayTotal)}</div>
        </div>
        <div class="ring">⏱</div>
      </div>
      ${dayTotal ? `<div class="mixbar">${mix}</div>` : ""}
    </div>
    `;
  /* group active categories by family, in registry order, DISPLAY_ORDER within */
  const cats = activeCats();
  const groups = {};
  for(const c of cats){ const f = famOf(c); (groups[f]=groups[f]||[]).push(c); }
  const famNames = Object.keys(groups).sort((a,b)=>{
    const r = familyRank(a)-familyRank(b);
    return r!==0 ? r : a.localeCompare(b);
  });
  const tile = c=>{
    const t = timerFor(c.id);
    const catToday = dayMap[c.id]||0;
    return `
      <div class="cat ${t?"running":""}" style="--c:${c.color}" data-cat="${c.id}">
        <div class="dot"></div>
        <div class="nm">${esc(c.name)}</div>
        <div class="tm" data-elapsed="${t?t.start:""}">${t ? fmtClock(Date.now()-t.start) : (catToday? fmtDur(catToday)+" today" : "tap to start")}</div>
        <button class="edit" data-editcat="${c.id}" aria-label="Edit">⋯</button>
      </div>`;
  };
  for(const f of famNames){
    const fc = familyColor(f);
    const famToday = groups[f].reduce((s,c)=>s+(dayMap[c.id]||0),0);
    h += `<section class="fam" style="--fc:${fc}">
      <div class="fam-h" data-editfam="${esc(f)}">
        <span class="fdot"></span><span class="fname">${esc(f)}</span>
        <span class="fmeta">${famToday?fmtDur(famToday):""}</span>
        <span class="fedit">edit ›</span>
      </div>
      <div class="grid">${groups[f].map(tile).join("")}</div>
    </section>`;
  }
  h += `<div class="grid" style="margin-top:14px"><button class="addcat" id="addCatBtn">＋ &nbsp;New category</button></div>`;
  v.innerHTML = h;

  v.querySelectorAll(".cat").forEach(el=>{
    el.addEventListener("click", e=>{
      if(e.target.closest(".edit")) return;
      toggleTimer(el.dataset.cat);
    });
  });
  v.querySelectorAll("[data-editcat]").forEach(b=>
    b.addEventListener("click", e=>{ e.stopPropagation(); openCatSheet(b.dataset.editcat); }));
  v.querySelectorAll("[data-editfam]").forEach(b=>
    b.addEventListener("click", ()=>openFamilySheet(b.dataset.editfam)));
  $("#addCatBtn").addEventListener("click", ()=>openCatSheet(null));
}

/* ============================== log view ============================== */
let logShowAll = false;
function renderLog(){
  const v = $("#view-log");
  let evs = [...S.events].sort((a,b)=>b.start-a.start);
  if(!evs.length){
    v.innerHTML = `<div class="empty"><div class="big">🗒️</div>No events yet.<br>Start a timer or tap ＋ to add a past entry.</div>`;
    return;
  }
  const totalCount = evs.length;
  // cap initial render to the 10 most recent days — keeps big logs snappy
  let capped = false;
  if(!logShowAll){
    const days = [...new Set(evs.map(e=>startOfDay(e.start)))].slice(0,10);
    const keep = new Set(days);
    const cut = evs.filter(e=>keep.has(startOfDay(e.start)));
    capped = cut.length < evs.length;
    evs = cut;
  }
  let h = "", lastDay = null, open = false;
  for(const ev of evs){
    const d = startOfDay(ev.start);
    if(d !== lastDay){
      if(open) h += `</div>`;
      const dayEvs = evs.filter(e=>startOfDay(e.start)===d);
      const dayTot = dayEvs.reduce((s,e)=>s+(e.end-e.start),0);
      h += `<div class="day-h"><span>${fmtDay(ev.start)}</span><span>${fmtDur(dayTot)}</span></div><div class="evcard">`;
      lastDay = d; open = true;
    }
    h += `
      <div class="ev" style="--c:${catColor(ev.catId)}" data-ev="${ev.id}">
        <div class="bar"></div>
        <div class="mid">
          <div class="t1">${esc(ev.name || catName(ev.catId))}</div>
          <div class="t2">${ev.name?esc(catName(ev.catId))+" · ":""}${fmtTime(ev.start)} → ${fmtTime(ev.end)}${ev.notes?" · 📝":""}</div>
        </div>
        <div class="dur">${fmtDur(ev.end-ev.start)}</div>
      </div>`;
  }
  if(open) h += `</div>`;
  if(capped) h += `<button class="btn ghost" id="logMore" style="margin-top:16px">Show all ${totalCount} events</button>`;
  v.innerHTML = h;
  v.querySelectorAll("[data-ev]").forEach(el=>
    el.addEventListener("click", ()=>openEventSheet(el.dataset.ev)));
  const more = $("#logMore");
  if(more) more.addEventListener("click", ()=>{ logShowAll = true; renderLog(); });
}

/* families are now editable: an ordered registry (S.settings.families) plus a
   `family` field on each category. These are the defaults / initial membership. */
const FAMILY_ORDER = [
  ["Screen Drain","#e3574e"], ["Food","#f08542"], ["Self-care","#a992ef"],
  ["Fitness","#d4408f"], ["Learning","#3aac52"], ["Career","#2ba39a"],

const CAT_FAMILY = {
  "bed & brainrot":"Screen Drain","fp":"Screen Drain","youtube":"Screen Drain","social media":"Screen Drain",
  "cooking":"Food","eating":"Food",
  "grooming":"Self-care","my health":"Self-care","planning / journaling":"Self-care",

  "socializing":"Connection","family time":"Connection","partner / dating":"Connection","volunteer service":"Connection",

  "sleep":"Sleep"
};
const famOf = c => (c && c.family) || CAT_FAMILY[String(c && c.name||"").toLowerCase()] || "Other";
function familyList(){ return (S.settings && S.settings.families) || FAMILY_ORDER.map(([name,color])=>({name,color})); }
function familyColor(name){
  const f = familyList().find(x=>x.name.toLowerCase()===String(name).toLowerCase());
  if(f) return f.color;
  const d = FAMILY_ORDER.find(x=>x[0].toLowerCase()===String(name).toLowerCase());
  return d ? d[1] : "#8b8f98";
}
function familyRank(name){
  const i = familyList().findIndex(x=>x.name.toLowerCase()===String(name).toLowerCase());
  return i<0 ? 998 : i;
}
/* ensure the family registry exists and every category has a family (migration + seed) */
function ensureFamilies(){
  if(!S.settings.families || !S.settings.families.length)
    S.settings.families = FAMILY_ORDER.map(([name,color])=>({name,color}));
  const known = new Set(S.settings.families.map(f=>f.name.toLowerCase()));
  for(const c of S.categories){
    if(!c.family) c.family = famOf(c);
    if(!known.has(c.family.toLowerCase())){
      S.settings.families.push({name:c.family, color:c.color||"#8b8f98"});
      known.add(c.family.toLowerCase());
    }
  }
}
function familyTotals(a,b){
  const out = {};
  for(const [cid,ms] of Object.entries(totals(a,b))){
    const key = famOf(cat(cid));
    if(!out[key]) out[key] = {color: familyColor(key), ms: 0};
    out[key].ms += ms;
  }
  return out;
}
/* untracked holes ≥15 min in a day (ignores category filters — untracked is untracked) */
function dayGaps(a,b){
  const now = Date.now(), end = Math.min(b, now);
  if(end <= a) return [];
  const ivs = [];
  const items = [...S.events, ...S.timers.map(t=>({start:t.start, end:now}))];
  for(const ev of items){
    const s = Math.max(ev.start,a), e = Math.min(ev.end,end);
    if(e>s) ivs.push([s,e]);
  }
  if(!ivs.length) return [];
  ivs.sort((x,y)=>x[0]-y[0]);
  const merged = [ivs[0].slice()];
  for(const [s,e] of ivs.slice(1)){
    const m = merged[merged.length-1];
    if(s <= m[1]) m[1] = Math.max(m[1], e); else merged.push([s,e]);
  }
  const gaps = [];
  let cur = a;
  for(const [s,e] of merged){
    if(s-cur >= 15*MIN) gaps.push([cur,s]);
    cur = Math.max(cur,e);
  }
  if(end-cur >= 15*MIN) gaps.push([cur,end]);
  return gaps.slice(0,8);
}
let statsRange = "day";      // day | week | month
let statsAnchor = Date.now();
let statsFilter = null;      // null = all, else Set of catIds

function rangeBounds(){
  if(statsRange==="day"){ const a=startOfDay(statsAnchor); return [a, a+DAY]; }
  if(statsRange==="week"){ const a=startOfWeek(statsAnchor); return [a, a+7*DAY]; }
  const a=startOfMonth(statsAnchor); return [a, endOfMonth(statsAnchor)];
}
function rangeLabel(){
  const [a,b] = rangeBounds();
  if(statsRange==="day") return fmtDay(a);
  if(statsRange==="week"){
    const d1=new Date(a), d2=new Date(b-1);
    return d1.toLocaleDateString([],{month:"short",day:"numeric"})+" – "+d2.toLocaleDateString([],{month:"short",day:"numeric"});
  }
  return new Date(a).toLocaleDateString([],{month:"long",year:"numeric"});
}
function shiftRange(dir){
  const [a,b] = rangeBounds();
  if(statsRange==="month"){
    const d=new Date(a); d.setMonth(d.getMonth()+dir); statsAnchor=d.getTime();
  } else statsAnchor = a + dir*(b-a);
  renderStats();
}

function renderStats(){
  const v = $("#view-stats");
  const [a,b] = rangeBounds();
  const filterSet = statsFilter && statsFilter.size ? statsFilter : null;
  const map = totals(a,b,filterSet);
  const total = sumVals(map);
  const catsWithData = new Set([...S.events.map(e=>e.catId), ...S.timers.map(t=>t.catId)]);
  const chipCats = S.categories.filter(c=>!c.archived || catsWithData.has(c.id));

  let h = `
    <div class="seg" id="rangeSeg">
      ${["day","week","month"].map(r=>`<button data-r="${r}" class="${statsRange===r?"on":""}">${r[0].toUpperCase()+r.slice(1)}</button>`).join("")}
    </div>
    <div class="rangenav">
      <button id="rPrev">‹</button>
      <div><div class="lab">${rangeLabel()}</div><div class="sub">${total?fmtDur(total)+" tracked":"nothing tracked"}</div></div>
      <button id="rNext" ${b>Date.now()?"disabled":""}>›</button>
    </div>
    <div class="chips" id="statChips">
      <button class="chip ${!filterSet?"on":""}" data-chip="all" style="--c:var(--accent)">All</button>
      ${chipCats.map(c=>`<button class="chip ${filterSet&&filterSet.has(c.id)?"on":""}" data-chip="${c.id}" style="--c:${c.color}"><span class="cd"></span>${esc(c.name)}</button>`).join("")}
    </div>`;

  if(statsRange==="day"){
    h += `<div class="panel"><h3>Day timeline</h3><div class="tl-strip" id="tlStrip"></div>
          <div class="tl-hours"><span>12am</span><span>6am</span><span>12pm</span><span>6pm</span><span>12am</span></div>
          <div class="chartinfo" id="tlInfo"><span style="opacity:.7">Tap a block to see which category the time is from</span></div></div>`;
    const gaps = dayGaps(a,b);
    if(gaps.length){
      h += `<div class="panel"><h3>Untracked time</h3>${
        gaps.map(([s,e])=>`<button class="gaprow" data-s="${s}" data-e="${e}">
          <span>${fmtTime(s)} → ${fmtTime(e)}</span><span class="gd">${fmtDur(e-s)} · log it ›</span></button>`).join("")
      }<div class="hint">Tap a gap to fill in what you were doing.</div></div>`;
    }
  } else {
    h += `<div class="panel"><h3>${statsRange==="week"?"Daily breakdown":"Days of the month"}</h3><canvas id="barCv" height="180"></canvas><div class="chartinfo" id="barInfo"><span style="opacity:.7">Tap a bar segment to see which category the time is from</span></div></div>`;
    if(statsRange==="week"){
      const cur = familyTotals(a,b), prev = familyTotals(a-(b-a), a);
      /* compare daily averages so a half-elapsed week isn't unfairly low */
      const daysCur = Math.max(1, Math.min(7, (Math.min(Date.now(),b)-a)/DAY));
      const keys = [...new Set([...Object.keys(cur), ...Object.keys(prev)])]
        .sort((x,y)=>((cur[y]||{}).ms||0)-((cur[x]||{}).ms||0));
      if(keys.length){
        h += `<div class="panel"><h3>This week vs last · daily average</h3>${keys.map(k=>{
          const c = ((cur[k]||{}).ms||0)/daysCur, p = ((prev[k]||{}).ms||0)/7;
          const color = (cur[k]||prev[k]).color;
          const diff = c-p;
          let chip;
          if(Math.abs(diff) < 5*MIN) chip = `<span class="delta" style="color:var(--text2)">≈ same</span>`;
          else{
            const up = diff>0;
            const good = k==="Screen Drain" ? !up : up;
            chip = `<span class="delta" style="color:${good?"var(--ok)":"var(--danger)"}">${up?"▲":"▼"} ${fmtDur(Math.abs(diff))}/day</span>`;
          }
          return `<div class="tot" style="--c:${color}"><div class="cd"></div><div class="nm">${esc(k)}</div>${chip}<div class="d">${fmtDur(c)}<span style="color:var(--text2);font-size:11.5px;font-weight:600">/day</span></div></div>`;
        }).join("")}<div class="hint">per-day averages (this week counts only days elapsed) · green means moving the right way</div></div>`;
      }
    }
  }
  h += `<div class="panel"><h3>Share of time</h3><canvas id="pieCv" height="230"></canvas><div class="chartinfo" id="pieInfo"><span style="opacity:.7">Tap a slice to see which category the time is from</span></div></div>`;

  const rows = Object.entries(map).sort((x,y)=>y[1]-x[1]);
  h += `<div class="panel"><h3>Totals</h3>${
    rows.length ? rows.map(([cid,ms])=>`
      <div class="tot" style="--c:${catColor(cid)}">
        <div class="cd"></div><div class="nm">${esc(catName(cid))}</div>
        <div class="pc">${Math.round(ms/total*100)}%</div><div class="d">${fmtDur(ms)}</div>
      </div>`).join("")
    : `<div style="color:var(--text2);font-size:14px;text-align:center;padding:12px">No data in this range</div>`
  }</div>`;

  v.innerHTML = h;

  v.querySelectorAll("#rangeSeg button").forEach(bn=>
    bn.addEventListener("click", ()=>{ statsRange = bn.dataset.r; statsAnchor = Date.now(); renderStats(); }));
  $("#rPrev").addEventListener("click", ()=>shiftRange(-1));
  $("#rNext").addEventListener("click", ()=>shiftRange(1));
  v.querySelectorAll("[data-chip]").forEach(ch=>ch.addEventListener("click", ()=>{
    const id = ch.dataset.chip;
    if(id==="all") statsFilter = null;
    else{
      if(!statsFilter) statsFilter = new Set();
      statsFilter.has(id) ? statsFilter.delete(id) : statsFilter.add(id);
      if(!statsFilter.size) statsFilter = null;
    }
    renderStats();
  }));

  v.querySelectorAll(".gaprow").forEach(gr=>gr.addEventListener("click", ()=>
    openEventSheet(null, {start:Number(gr.dataset.s), end:Number(gr.dataset.e)})));

  if(statsRange==="day") drawDayStrip(a,b,filterSet);
  else drawBars(a,b,filterSet);
  drawPie(map,total);
}

function showChartInfo(id, cid, text){
  const el = $("#"+id); if(!el) return;
  el.innerHTML = `<span class="cd" style="background:${catColor(cid)}"></span><span><b>${esc(catName(cid))}</b> · ${text}</span>`;
}
function drawDayStrip(a,b,filterSet){
  const strip = $("#tlStrip"); if(!strip) return;
  let h = "";
  const items = [...S.events, ...S.timers.map(t=>({catId:t.catId,name:"",start:t.start,end:Date.now()}))];
  for(const ev of items){
    if(filterSet && !filterSet.has(ev.catId)) continue;
    const s = Math.max(ev.start,a), e = Math.min(ev.end,b);
    if(e<=s) continue;
    const l = (s-a)/DAY*100, w = (e-s)/DAY*100;
    h += `<div class="blk" style="left:${l}%;width:${Math.max(w,.35)}%;background:${catColor(ev.catId)}" data-cid="${ev.catId}" data-s="${s}" data-e="${e}"></div>`;
  }
  strip.innerHTML = h || `<div style="display:grid;place-items:center;height:100%;color:var(--text2);font-size:12.5px;font-weight:600">Nothing tracked this day</div>`;
  strip.querySelectorAll(".blk").forEach(bl=>bl.addEventListener("click", ev=>{
    ev.stopPropagation();
    const s = Number(bl.dataset.s), e = Number(bl.dataset.e);
    showChartInfo("tlInfo", bl.dataset.cid, `${fmtTime(s)} → ${fmtTime(e)} · ${fmtDur(e-s)}`);
  }));
}

function setupCanvas(cv){
  const dpr = window.devicePixelRatio||1;
  const w = cv.clientWidth, hh = Number(cv.getAttribute("height"));
  cv.width = w*dpr; cv.height = hh*dpr;
  cv.style.height = hh+"px";
  const ctx = cv.getContext("2d"); ctx.scale(dpr,dpr);
  return [ctx,w,hh];
}
const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

function drawBars(a,b,filterSet){
  const cv = $("#barCv"); if(!cv) return;
  const [ctx,W,H] = setupCanvas(cv);
  const days = Math.round((b-a)/DAY);
  const perDay = [];
  let maxMs = 0;
  for(let i=0;i<days;i++){
    const m = totals(a+i*DAY, a+(i+1)*DAY, filterSet);
    perDay.push(m); maxMs = Math.max(maxMs, sumVals(m));
  }
  if(!maxMs){ ctx.fillStyle=cssVar("--text2"); ctx.font="600 13px -apple-system,sans-serif"; ctx.textAlign="center"; ctx.fillText("No data in this range", W/2, H/2); return; }
  const maxH = Math.ceil(maxMs/HOUR) * HOUR;
  const padB = 22, padT = 14, chartH = H-padB-padT;
  // gridlines
  ctx.strokeStyle = cssVar("--line"); ctx.fillStyle = cssVar("--text2");
  ctx.font = "600 9.5px -apple-system,sans-serif"; ctx.textAlign="right";
  const steps = Math.min(4, maxH/HOUR);
  for(let i=0;i<=steps;i++){
    const y = padT + chartH - (i/steps)*chartH;
    ctx.beginPath(); ctx.moveTo(24,y); ctx.lineTo(W,y); ctx.stroke();
    ctx.fillText(Math.round(maxH/HOUR*i/steps)+"h", 21, y+3);
  }
  const gap = days>14 ? 2.5 : 6;
  const bw = (W-30-gap*days)/days;
  ctx.textAlign="center";
  const hitRects = [];
  for(let i=0;i<days;i++){
    let y = padT + chartH;
    const entries = Object.entries(perDay[i]).sort((x,z)=>z[1]-x[1]);
    for(const [cid,ms] of entries){
      const bh = ms/maxH*chartH;
      ctx.fillStyle = catColor(cid);
      const x = 30+i*(bw+gap);
      roundRect(ctx, x, y-bh, bw, bh, Math.min(3,bw/3)); ctx.fill();
      hitRects.push({x, y:y-bh, w:bw, h:bh, cid, ms,
        day:new Date(a+i*DAY).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"})});
      y -= bh;
    }
    ctx.fillStyle = cssVar("--text2");
    const d = new Date(a+i*DAY);
    const lbl = days>14 ? (d.getDate()%5===1||d.getDate()===1 ? String(d.getDate()) : "") : "MTWTFSS"[(d.getDay()+6)%7];
    if(lbl) ctx.fillText(lbl, 30+i*(bw+gap)+bw/2, H-7);
  }
  cv._hits = hitRects;
  cv.onclick = e=>{
    const ox = e.offsetX, oy = e.offsetY;
    const hit = (cv._hits||[]).find(r=>ox>=r.x && ox<=r.x+r.w && oy>=r.y && oy<=r.y+r.h);
    if(hit) showChartInfo("barInfo", hit.cid, `${hit.day} · ${fmtDur(hit.ms)}`);
  };
}
function roundRect(ctx,x,y,w,h,r){
  r = Math.min(r, h/2, w/2); if(r<0.5){ ctx.beginPath(); ctx.rect(x,y,w,h); return; }
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function drawPie(map,total){
  const cv = $("#pieCv"); if(!cv) return;
  const [ctx,W,H] = setupCanvas(cv);
  if(!total){ ctx.fillStyle=cssVar("--text2"); ctx.font="600 13px -apple-system,sans-serif"; ctx.textAlign="center"; ctx.fillText("No data in this range", W/2, H/2); return; }
  const cx = W/2, cy = H/2, R = Math.min(W,H)/2-12, r = R*0.62;
  let ang = -Math.PI/2, rel = 0;
  const rows = Object.entries(map).sort((x,y)=>y[1]-x[1]);
  const slices = [];
  for(const [cid,ms] of rows){
    const sweep = ms/total*Math.PI*2;
    ctx.beginPath();
    ctx.arc(cx,cy,R,ang,ang+sweep);
    ctx.arc(cx,cy,r,ang+sweep,ang,true);
    ctx.closePath();
    ctx.fillStyle = catColor(cid); ctx.fill();
    ctx.strokeStyle = cssVar("--card"); ctx.lineWidth = 2; ctx.stroke();
    slices.push({cid, ms, r0:rel, r1:rel+sweep});
    // % label
    if(sweep > 0.35){
      const mid = ang+sweep/2, lr = (R+r)/2;
      ctx.fillStyle = "#fff"; ctx.font = "800 11px -apple-system,sans-serif"; ctx.textAlign="center";
      ctx.fillText(Math.round(ms/total*100)+"%", cx+Math.cos(mid)*lr, cy+Math.sin(mid)*lr+4);
    }
    ang += sweep; rel += sweep;
  }
  cv._geo = {cx, cy, R, r, slices, total};
  cv.onclick = e=>{
    const g = cv._geo; if(!g) return;
    const dx = e.offsetX-g.cx, dy = e.offsetY-g.cy;
    const dist = Math.hypot(dx,dy);
    if(dist < g.r*0.5 || dist > g.R+8) return;
    let a2 = Math.atan2(dy,dx) + Math.PI/2;
    if(a2 < 0) a2 += Math.PI*2;
    const s = g.slices.find(x=>a2>=x.r0 && a2<x.r1);
    if(s){
      const pct = s.ms/g.total*100;
      showChartInfo("pieInfo", s.cid, `${fmtDur(s.ms)} · ${pct<1?"<1":Math.round(pct)}% of tracked time`);
    }
  };
  ctx.fillStyle = cssVar("--text"); ctx.font = "800 20px -apple-system,sans-serif"; ctx.textAlign="center";
  ctx.fillText(fmtDur(total), cx, cy+2);
  ctx.fillStyle = cssVar("--text2"); ctx.font = "600 11px -apple-system,sans-serif";
  ctx.fillText("total", cx, cy+18);
}

/* ============================== goals view ============================== */
const PERIODS = {day:"Daily", week:"Weekly", month:"Monthly"};
function goalBounds(p){
  const now = Date.now();
  if(p==="day") return [startOfDay(now), startOfDay(now)+DAY];
  if(p==="week") return [startOfWeek(now), startOfWeek(now)+7*DAY];
  return [startOfMonth(now), endOfMonth(now)];
}
function goalProgress(g){
  const [a,b] = goalBounds(g.period);
  return sumVals(totals(a,b,new Set([g.catId])));
}
let celebrated = new Set();
function checkGoalCelebrate(){
  for(const g of S.goals){
    const done = goalProgress(g) >= g.target*MIN;
    const key = g.id + goalBounds(g.period)[0];
    if(done && !celebrated.has(key)){ celebrated.add(key); toast("🎉 Goal reached: " + catName(g.catId)); }
  }
}
function renderGoals(){
  const v = $("#view-goals");
  if(!S.goals.length){
    v.innerHTML = `<div class="empty"><div class="big">🎯</div>No goals yet.<br>Tap ＋ to set a daily, weekly, or monthly time goal.</div>`;
    return;
  }
  v.innerHTML = S.goals.map(g=>{
    const done = goalProgress(g), tgt = Math.max(0, g.target*MIN);
    const ratio = tgt>0 ? done/tgt : (done>0?1:0);   /* guard divide-by-zero */
    const pct = Math.min(100, ratio*100);
    return `
      <div class="goal ${pct>=100?"done":""}" style="--c:${catColor(g.catId)}" data-goal="${g.id}">
        ${pct>=100?`<div class="check">✓</div>`:""}
        <div class="row1"><div class="cd"></div><div class="nm">${esc(catName(g.catId))}</div><div class="per">${PERIODS[g.period]||esc(g.period)}</div></div>
        <div class="nums"><span>${fmtDur(done)} of ${fmtDur(tgt)}</span><span>${Math.round(ratio*100)}%</span></div>
        <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
      </div>`;
  }).join("");
  v.querySelectorAll("[data-goal]").forEach(el=>
    el.addEventListener("click", ()=>openGoalSheet(el.dataset.goal)));
}

/* ============================== export / import ============================== */
function download(name, text, mime){
  const blob = new Blob([text], {type:mime});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
}
function lastBackupLabel(){
  const t = S.settings.lastBackup;
  if(!t) return "never";
  const d = Math.floor((Date.now()-t)/DAY);
  return d===0 ? "today" : d+"d ago";
}
function markBackedUp(){ S.settings.lastBackup = Date.now(); save(); if(currentView==="settings") renderSettings(); }
/* one file, all data: events + categories + goals in labelled sections */
function exportAll(){
  const q = s => '"' + String(s??"").replace(/"/g,'""') + '"';
  let csv = "EVENTS\nName,Category,Start,End,Duration (min),Notes\n";
  for(const ev of [...S.events].sort((a,b)=>a.start-b.start)){
    csv += [q(ev.name), q(catName(ev.catId)), q(new Date(ev.start).toLocaleString()),
            q(new Date(ev.end).toLocaleString()), Math.round((ev.end-ev.start)/MIN), q(ev.notes)].join(",") + "\n";
  }
  csv += "\nCATEGORIES\nName,Color,Archived,Total time (min)\n";
  const all = totals(0, Date.now()+DAY);
  for(const c of S.categories)
    csv += [q(c.name), q(c.color), c.archived?"yes":"no", Math.round((all[c.id]||0)/MIN)].join(",") + "\n";
  csv += "\nGOALS\nCategory,Period,Target (min)\n";
  for(const g of S.goals)
    csv += [q(catName(g.catId)), g.period, g.target].join(",") + "\n";
  download("moment-meter-all-" + new Date().toISOString().slice(0,10) + ".csv", csv, "text/csv");
  markBackedUp(); toast("Everything exported");
}
function exportJSON(){
  /* never write the sync token into backup files */
  const clean = {...S, settings:{...S.settings, sync:undefined}};
  download("moment-meter-backup-" + new Date().toISOString().slice(0,10) + ".json", JSON.stringify(clean,null,1), "application/json");
  markBackedUp(); toast("Backup saved");
}
/* tolerant CSV import — handles this app's exports and Timelines-style exports */
function parseCSV(text){
  text = String(text).replace(/^﻿/, "");
  const rows = [];
  let cur = "", inQ = false, out = [];
  for(let i=0;i<text.length;i++){
    const ch = text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else inQ=false; }
      else cur += ch;
    } else if(ch==='"') inQ = true;
    else if(ch===","){ out.push(cur); cur=""; }
    else if(ch==="\n"||ch==="\r"){
      if(cur!==""||out.length){ out.push(cur); rows.push(out); out=[]; cur=""; }
      if(ch==="\r"&&text[i+1]==="\n") i++;
    } else cur += ch;
  }
  if(cur!==""||out.length){ out.push(cur); rows.push(out); }
  return rows;
}
function importCSV(e){
  const f = e.target.files[0]; if(!f) return;
  e.target.value = "";
  const r = new FileReader();
  r.onload = ()=>{
    const rows = parseCSV(String(r.result));
    /* Timelines daily-summary format: date, <category columns...>, All */
    if(rows.length && rows[0][0] && rows[0][0].trim().toLowerCase()==="date"){
      const head = rows[0].map(h=>h.trim());
      let added = 0, skipped = 0;
      const findOrMakeCat = n=>{
        let c = S.categories.find(x=>x.name.toLowerCase()===n.toLowerCase());
        if(!c){
          const known = SEED_CATS.find(([nm])=>nm.toLowerCase()===n.toLowerCase());
          c = {id:uid(), name:n, color:known?known[1]:PALETTE[S.categories.length%PALETTE.length], archived:false};
          S.categories.push(c);
        }
        return c;
      };
      let daysSkipped = 0;
      for(let i=1;i<rows.length;i++){
        const rw = rows[i];
        const dm = /^(\d{4})-(\d{2})-(\d{2})/.exec((rw[0]||"").trim());
        if(!dm) continue;
        const dayStart = new Date(+dm[1], +dm[2]-1, +dm[3]).getTime();
        /* a day that already holds events is skipped whole — otherwise a re-export
           with updated numbers would double-count. Delete the day first to replace it. */
        if(S.events.some(e=>e.start < dayStart+86400000 && e.end > dayStart)){ daysSkipped++; continue; }
        const durs = {};
        for(let j=1;j<head.length;j++){
          let nm = head[j];
          if(!nm || /^all$/i.test(nm)) continue;
          nm = aliasName(nm);
          const ms = hms(rw[j]||"");
          if(ms>0) durs[nm] = (durs[nm]||0)+ms;
        }
        for(const ev of layoutDay(dayStart, durs, findOrMakeCat)){
          S.events.push(ev); added++;
        }
      }
      save(); renderAll();
      return toast(added + " imported" + (daysSkipped ? ", " + daysSkipped + " day" + (daysSkipped>1?"s":"") + " skipped (already have data)" : ""));
    }
    // find the header row (skip section labels like "EVENTS")
    const hi = rows.findIndex(rw => rw.length>=3 && rw.some(c=>/start|from/i.test(c)) && rw.some(c=>/end|to$|until/i.test(c)));
    if(hi<0) return toast("Couldn't find Start/End columns");
    const head = rows[hi].map(c=>c.trim().toLowerCase());
    const ix = {
      start: head.findIndex(h=>/start|from/.test(h)),
      end:   head.findIndex(h=>/end|^to$|until/.test(h)),
      cat:   head.findIndex(h=>/categor|activity|type/.test(h)),
      name:  head.findIndex(h=>/name|event|title|comment/.test(h)),
      notes: head.findIndex(h=>/note/.test(h))
    };
    let added = 0, skipped = 0;
    const findOrMakeCat = n=>{
      n = aliasName(n||"Imported") || "Imported";
      let c = S.categories.find(x=>x.name.toLowerCase()===n.toLowerCase());
      if(!c){ c = {id:uid(), name:n, color:PALETTE[S.categories.length%PALETTE.length], archived:false}; S.categories.push(c); }
      return c;
    };
    for(let i=hi+1;i<rows.length;i++){
      const rw = rows[i];
      if(rw.length < 2 || /^(categories|goals|events)$/i.test(rw[0])) break;
      const s = new Date(rw[ix.start]).getTime(), en = new Date(rw[ix.end]).getTime();
      if(isNaN(s)||isNaN(en)||en<=s){ skipped++; continue; }
      const c = findOrMakeCat(ix.cat>=0 ? rw[ix.cat] : "");
      // skip exact duplicates
      if(S.events.some(ev=>ev.catId===c.id && ev.start===s && ev.end===en)){ skipped++; continue; }
      S.events.push({id:uid(), catId:c.id, name:ix.name>=0?(rw[ix.name]||"").trim():"", start:s, end:en, notes:ix.notes>=0?(rw[ix.notes]||"").trim():""});
      added++;
    }
    save(); renderAll();
    toast(added + " imported" + (skipped ? ", " + skipped + " skipped" : ""));
  };
  r.readAsText(f);
}
function importJSON(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!d.categories || !d.events) throw 0;
      S = d; S.timers = S.timers||[]; S.goals = S.goals||[]; S.settings = S.settings||{theme:"auto"};
      save(); applyTheme(); renderAll(); toast("Backup restored");
    }catch(err){ toast("Invalid backup file"); }
  };
  r.readAsText(f);
}

/* ============================== sync (private GitHub Gist) ============================== */
const SYNC_FILE = "momentmeter.json";
async function ghApi(path, method, body, token, keepalive){
  const res = await fetch("https://api.github.com"+path, {
    method: method||"GET",
    headers: {
      "Authorization": "Bearer "+token,
      "Accept": "application/vnd.github+json",
      ...(body ? {"Content-Type":"application/json"} : {})
    },
    body: body ? JSON.stringify(body) : undefined,
    keepalive: !!keepalive   /* lets a push survive the app being backgrounded/closed */
  });
  if(!res.ok) throw new Error("GitHub " + res.status);
  return res.json();
}
/* content-based deletion tombstones embed the category name; when a category is
   renamed we must migrate those tombstones so deletions survive the rename */
function remapDeletedKeys(oldName, newName){
  if(!S.deletedKeys || !S.deletedKeys.length) return;
  const from = String(oldName).toLowerCase()+"|", to = String(newName).toLowerCase()+"|";
  if(from===to) return;
  S.deletedKeys = S.deletedKeys.map(k => k.startsWith(from) ? to + k.slice(from.length) : k);
}
function syncPayload(){
  return { app:"moment-meter", v:1, updated:Date.now(),
    categories:S.categories, events:S.events, goals:S.goals, timers:S.timers,
    families:(S.settings&&S.settings.families)||[],   // name+color only — never the token
    deleted:S.deleted, deletedCats:S.deletedCats, deletedKeys:S.deletedKeys };
}
/* merge a remote snapshot into local state — devices seed independently, so
   categories are matched by NAME and remote ids are remapped to local ids */
function mergeRemote(R){
  const ci = s=>String(s||"").toLowerCase();
  /* sanitize remote: a corrupt gist (null/garbage array elements) must never abort the merge */
  const objs = x => (Array.isArray(x)?x:[]).filter(o=>o && typeof o==="object" && !Array.isArray(o));
  const strs = x => (Array.isArray(x)?x:[]).filter(v=>typeof v==="string" || typeof v==="number").map(String);
  R.categories = objs(R.categories).filter(c=>c.id!=null);
  R.events = objs(R.events).filter(e=>e.id!=null);
  R.goals = objs(R.goals).filter(g=>g.id!=null);
  R.timers = objs(R.timers).filter(t=>t.catId!=null && typeof t.start==="number");
  R.deleted = strs(R.deleted); R.deletedCats = strs(R.deletedCats); R.deletedKeys = strs(R.deletedKeys);
  S.deleted = [...new Set([...(S.deleted||[]), ...R.deleted])].slice(-2000);
  S.deletedCats = [...new Set([...(S.deletedCats||[]).map(ci), ...R.deletedCats.map(ci)])].slice(-200);
  S.deletedKeys = [...new Set([...(S.deletedKeys||[]), ...R.deletedKeys])].slice(-2000);
  const delIds = new Set(S.deleted), delCats = new Set(S.deletedCats), delKeys = new Set(S.deletedKeys);
  S.categories = S.categories.filter(c=>!delCats.has(ci(c.name)));
  /* SETTLE CATEGORIES FIRST (ids + names) so content tombstones and event de-dupe
     below always see final category names — otherwise a rename in this same merge
     lets a deleted event slip past its (old-name) tombstone and resurrect */
  const idMap = {};
  for(const rc of (R.categories||[])){
    if(delCats.has(ci(rc.name))){ idMap[rc.id] = null; continue; }
    let lc = S.categories.find(c=>c.id===rc.id);
    if(!lc){
      lc = S.categories.find(c=>ci(c.name)===ci(rc.name));
      if(lc && lc.id !== rc.id){
        /* unify ids across devices so future renames/edits track the same category */
        const old = lc.id;
        lc.id = rc.id;
        for(const e of S.events) if(e.catId===old) e.catId = rc.id;
        for(const g of S.goals)  if(g.catId===old) g.catId = rc.id;
        for(const t of S.timers) if(t.catId===old) t.catId = rc.id;
      }
    }
    if(!lc){
      lc = {id:rc.id, name:rc.name, color:rc.color, archived:!!rc.archived, family:rc.family, mod:rc.mod||0};
      S.categories.push(lc);
    } else if((rc.mod||0) > (lc.mod||0)){
      /* newer edit wins: renames, color changes, archive state, family */
      if(ci(lc.name) !== ci(rc.name)) remapDeletedKeys(lc.name, rc.name);
      lc.name = rc.name; lc.color = rc.color; lc.archived = !!rc.archived;
      if(rc.family) lc.family = rc.family;
      lc.mod = rc.mod;
    }
    idMap[rc.id] = lc.id;
  }
  sortCats(S.categories);
  /* now that names/ids are final, apply deletions to local events & goals.
     an event is content-deleted if EITHER its name-key OR its (rename-proof) id-key
     is tombstoned — the id-key survives category renames, the name-key covers the
     pre-unification case where two devices use different ids for the same category */
  const contentDeleted = e =>
    delKeys.has(ci(catName(e.catId))+"|"+e.start+"|"+e.end) ||
    delKeys.has(e.catId+"|"+e.start+"|"+e.end);
  S.events = S.events.filter(e=>!delIds.has(e.id) && !contentDeleted(e));
  S.goals = S.goals.filter(g=>!delIds.has(g.id));
  const evKey = e=>e.catId+"|"+e.start+"|"+e.end;
  const haveIds = new Set(S.events.map(e=>e.id));
  const haveKeys = new Set(S.events.map(evKey));
  for(const re of (R.events||[])){
    if(delIds.has(re.id)) continue;
    const cid = idMap[re.catId];
    if(!cid) continue;
    const ne = {...re, catId:cid};
    if(contentDeleted(ne)) continue;           /* deleted by content on some device */
    if(haveIds.has(re.id)){                    /* same event both sides: newer edit wins */
      const le = S.events.find(e=>e.id===re.id);
      if((re.mod||0) > (le.mod||0)) Object.assign(le, ne);
      continue;
    }
    if(haveKeys.has(evKey(ne))) continue;      /* same data seeded/imported on both devices */
    S.events.push(ne); haveIds.add(ne.id); haveKeys.add(evKey(ne));
  }
  const gKey = g=>g.catId+"|"+g.period;
  const gIds = new Set(S.goals.map(g=>g.id)), gKeys = new Set(S.goals.map(gKey));
  for(const rg of (R.goals||[])){
    if(delIds.has(rg.id) || gIds.has(rg.id)) continue;
    const cid = idMap[rg.catId]; if(!cid) continue;
    const ng = {...rg, catId:cid};
    if(gKeys.has(gKey(ng))) continue;
    S.goals.push(ng); gIds.add(ng.id); gKeys.add(gKey(ng));
  }
  /* family registry: keep local defs, add any the other device has that we lack */
  if(Array.isArray(R.families)){
    S.settings.families = S.settings.families || [];
    const have = new Set(S.settings.families.map(f=>ci(f.name)));
    for(const rf of R.families){
      if(rf && rf.name && !have.has(ci(rf.name))){ S.settings.families.push({name:rf.name, color:rf.color||"#8b8f98"}); have.add(ci(rf.name)); }
    }
  }
  /* running timers travel too — unless this device already stopped them (event exists) */
  const evStarts = new Set(S.events.map(e=>e.catId+"|"+e.start));
  for(const rt of (R.timers||[])){
    const cid = idMap[rt.catId]; if(!cid) continue;
    if(evStarts.has(cid+"|"+rt.start)) continue;
    const ex = S.timers.find(t=>t.catId===cid);
    if(ex) ex.start = Math.min(ex.start, rt.start);
    else S.timers.push({catId:cid, start:rt.start});
  }
  /* drop timers whose category no longer exists */
  const liveCat = new Set(S.categories.map(c=>c.id));
  S.timers = S.timers.filter(t=>liveCat.has(t.catId));
  /* switch mode means one activity at a time: if a merge produced several running
     timers, keep the most recent and log the earlier ones so no time is lost */
  if(S.settings.switchMode !== false && S.timers.length > 1){
    S.timers.sort((a,b)=>a.start-b.start);
    const keep = S.timers[S.timers.length-1];
    for(let i=0;i<S.timers.length-1;i++){
      const t = S.timers[i], end = S.timers[i+1].start;
      if(end - t.start >= 30000 && !evStarts.has(t.catId+"|"+t.start))
        S.events.push({id:uid(), catId:t.catId, name:"", start:t.start, end, notes:"", mod:Date.now()});
    }
    S.timers = [keep];
  }
  ensureFamilies();   /* any merged-in category gets a family; registry stays complete */
}
/* ---- sync status + self-healing engine ---- */
let syncState = "idle";       // idle | syncing | ok | error
let syncErrKind = "";         // "auth" | "net"
let autoPushTimer = null, retryTimer = null;
function setSyncState(s, kind){ syncState = s; syncErrKind = kind||""; updateSyncPill(); }
function scheduleAutoPush(){
  if(!S.settings.sync) return;
  clearTimeout(autoPushTimer);
  autoPushTimer = setTimeout(()=>{ if(!window.__inSync) syncNow(true); }, 3500);
}
function scheduleRetry(){
  clearTimeout(retryTimer);
  retryTimer = setTimeout(()=>{ if(navigator.onLine!==false) syncNow(true); }, 20000);
}
async function syncNow(silent){
  const cfg = S.settings.sync;
  if(!cfg || !cfg.token) return;
  if(window.__inSync) return;               // never overlap two syncs (avoids races)
  window.__inSync = true; clearTimeout(autoPushTimer); clearTimeout(retryTimer);
  setSyncState("syncing");
  if(!silent) toast("Syncing…");
  try{
    const g = await ghApi("/gists/"+cfg.gistId, "GET", null, cfg.token);
    const f = g.files && g.files[SYNC_FILE];
    let remote = null;
    if(f){
      let content = f.content;
      if(f.truncated){ const r = await fetch(f.raw_url); content = await r.text(); }
      try{ remote = JSON.parse(content); }catch(e){}
    }
    if(remote && remote.app==="moment-meter") mergeRemote(remote);
    await ghApi("/gists/"+cfg.gistId, "PATCH",
      {files:{[SYNC_FILE]:{content: JSON.stringify(syncPayload())}}}, cfg.token);
    cfg.lastSync = Date.now(); cfg.lastError = null;
    save(); renderAll();                     /* still __inSync, so this save won't self-trigger */
    window.__inSync = false;
    setSyncState("ok");
    if(!silent) toast("✓ Synced");
  }catch(err){
    window.__inSync = false;
    const code = String(err.message||err);
    const auth = code.includes("401") || code.includes("403") || code.includes("404");
    cfg.lastError = {t:Date.now(), auth};
    try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
    setSyncState("error", auth?"auth":"net");
    if(!silent) toast(auth ? "Sync failed — reconnect your token" : "Offline — will retry automatically");
    if(!auth) scheduleRetry();              // transient network error: retry soon
  }
}
async function syncConnect(token){
  toast("Connecting…");
  try{
    const gists = await ghApi("/gists?per_page=100", "GET", null, token);
    let gist = gists.find(x=>x.files && x.files[SYNC_FILE]);
    if(!gist){
      gist = await ghApi("/gists", "POST",
        {description:"Moment Meter sync", public:false,
         files:{[SYNC_FILE]:{content: JSON.stringify(syncPayload())}}}, token);
    }
    S.settings.sync = {token, gistId:gist.id, lastSync:null, lastError:null};
    save(); closeSheet();
    updateSyncPill();
    await syncNow(false);
    if(currentView==="settings") renderSettings();
  }catch(err){ toast("Couldn't connect — check the token"); }
}
function fmtSyncAgo(t){
  if(!t) return "never";
  const m = Math.floor((Date.now()-t)/MIN);
  if(m<1) return "just now";
  if(m<60) return m+"m ago";
  if(m<1440) return Math.floor(m/60)+"h ago";
  return Math.floor(m/1440)+"d ago";
}
/* the always-visible header pill — one glance tells you sync is healthy */
function updateSyncPill(){
  const pill = document.getElementById("syncPill");
  if(!pill) return;
  const cfg = S.settings && S.settings.sync;
  if(!cfg){ pill.hidden = true; return; }
  pill.hidden = false;
  let cls="", txt="";
  if(syncState==="syncing"){ cls="syncing"; txt="Syncing…"; }
  else if(syncState==="error" && syncErrKind==="auth"){ cls="err"; txt="Reconnect"; }
  else if(syncState==="error"){ cls="warn"; txt="Offline · retrying"; }
  else if(!cfg.lastSync){ cls=""; txt="Sync"; }
  else {
    const stale = Date.now()-cfg.lastSync > 25*HOUR;
    cls = stale ? "warn" : "ok";
    txt = "Synced " + fmtSyncAgo(cfg.lastSync);
  }
  pill.className = "syncpill " + cls;
  pill.innerHTML = `<span class="sdot"></span><span class="stxt">${txt}</span>`;
}
/* best-effort push when the app is closing/backgrounding — keepalive lets the
   request outlive the page. GitHub caps keepalive bodies at 64KB, so skip if larger
   (the next launch will do a full sync anyway). */
function syncPushOnExit(){
  const cfg = S.settings.sync;
  if(!cfg || !cfg.token) return;
  try{
    const body = JSON.stringify({files:{[SYNC_FILE]:{content: JSON.stringify(syncPayload())}}});
    if(body.length > 60000) return;
    fetch("https://api.github.com/gists/"+cfg.gistId, {
      method:"PATCH",
      headers:{Authorization:"Bearer "+cfg.token, Accept:"application/vnd.github+json", "Content-Type":"application/json"},
      body, keepalive:true
    }).catch(()=>{});
  }catch(e){}
}
