/* ============================== sync (private GitHub Gist) ============================== */
const SYNC_FILE = "momentmeter.json";
async function ghApi(path, method, body, token, keepalive){
  let res;
  try{
    res = await fetch("https://api.github.com"+path, {
      method: method||"GET",
      headers: {
        "Authorization": "Bearer "+token,
        "Accept": "application/vnd.github+json",
        ...(body ? {"Content-Type":"application/json"} : {})
      },
      body: body ? JSON.stringify(body) : undefined,
      keepalive: !!keepalive,
      cache: "no-store"        // sync must ALWAYS hit the network — never a cached Gist
    });
  }catch(netErr){ const e = new Error("network"); e.network = true; throw e; }
  if(!res.ok){
    let msg = "";
    try{ const j = await res.json(); msg = j && j.message || ""; }catch(e){}
    const err = new Error("GitHub " + res.status + (msg?" — "+msg:""));
    err.status = res.status; err.ghMessage = msg;
    /* how long GitHub wants us to wait, in ms (Retry-After secs, or x-ratelimit-reset epoch) */
    let waitMs = 0;
    try{
      const ra = res.headers.get("retry-after");
      if(ra) waitMs = Number(ra)*1000;
      else if((res.headers.get("x-ratelimit-remaining")==="0")){
        const reset = Number(res.headers.get("x-ratelimit-reset"))*1000;
        if(reset) waitMs = reset - Date.now();
      }
    }catch(e){}
    err.retryMs = Math.max(0, waitMs);
    throw err;
  }
  return res.json();
}
/* list this token's Moment Meter gists, OLDEST first (deterministic so every device
   converges on the same one — .find() order is not stable across devices) */
async function syncListGists(token){
  const gists = await ghApi("/gists?per_page=100", "GET", null, token);
  return (gists||[]).filter(x=>x.files && x.files[SYNC_FILE])
    .sort((a,b)=> new Date(a.created_at||0) - new Date(b.created_at||0));
}
async function syncFindOrCreateGist(token){
  const mine = await syncListGists(token);
  if(mine.length) return mine[0].id;                    // oldest = canonical
  const g = await ghApi("/gists", "POST",
    {description:"Moment Meter sync", public:false, files:{[SYNC_FILE]:{content: JSON.stringify(syncPayload())}}}, token);
  return g.id;
}
/* CONVERGENCE: if a device ever ended up on a different gist (a setup race, or a
   404 self-heal that created a second one), merge EVERY Moment Meter gist into local
   and write the result to the oldest. This re-links devices without losing data. */
async function syncConsolidate(token){
  const mine = await syncListGists(token);
  if(!mine.length){
    const g = await ghApi("/gists", "POST",
      {description:"Moment Meter sync", public:false, files:{[SYNC_FILE]:{content: JSON.stringify(syncPayload())}}}, token);
    return g.id;
  }
  const canonical = mine[0].id;
  for(const meta of mine){
    try{
      const full = await ghApi("/gists/"+meta.id, "GET", null, token);
      const f = full.files && full.files[SYNC_FILE];
      if(!f) continue;
      let content = f.content;
      if(f.truncated){ const r = await fetch(f.raw_url, {cache:"no-store"}); content = await r.text(); }
      const remote = JSON.parse(content);
      if(remote && remote.app==="moment-meter") mergeRemote(remote);
    }catch(e){}
  }
  await ghApi("/gists/"+canonical, "PATCH",
    {files:{[SYNC_FILE]:{content: JSON.stringify(syncPayload())}}}, token);
  save();
  return canonical;
}
/* content-based deletion tombstones embed the category name; when a category is

    if(contentDeleted(ne)) continue;           /* deleted by content on some device */
    if(haveIds.has(re.id)){                    /* same event both sides: newer edit wins */

    }

  const gIds = new Set(S.goals.map(g=>g.id)), gKeys = new Set(S.goals.map(gKey));

    else { const cid = idMap[rg.catId]; if(!cid) continue; ng = {...rg, catId:cid}; }
    if(gKeys.has(gKey(ng))) continue;

  /* family registry: keep local defs, add any the other device has that we lack */
  if(Array.isArray(R.families)){
    S.settings.families = S.settings.families || [];
    const have = new Set(S.settings.families.map(f=>ci(f.name)));
    for(const rf of R.families){
      if(rf && rf.name && !have.has(ci(rf.name))){ S.settings.families.push({name:rf.name, color:rf.color||"#8b8f98"}); have.add(ci(rf.name)); }
    }
  }
  /* running timers travel too — unless this device already stopped them (event exists) */
  const evStarts = new Set(S.events.map(e=>e.catId+"|"+e.start));
  /* STOP propagates: if a timer was stopped-and-logged on ANY device, a matching
     event now exists — so remove any local timer that corresponds to a logged event.
     (Fixes: stop on iPhone, but Mac still shows it running.) */
  S.timers = S.timers.filter(t => !evStarts.has(t.catId+"|"+t.start));
  for(const rt of (R.timers||[])){
    const cid = idMap[rt.catId]; if(!cid) continue;
    if(evStarts.has(cid+"|"+rt.start)) continue;   // already stopped elsewhere
    const ex = S.timers.find(t=>t.catId===cid);
    if(ex) ex.start = Math.min(ex.start, rt.start);

  }

  const liveCat = new Set(S.categories.map(c=>c.id));
  S.timers = S.timers.filter(t=>liveCat.has(t.catId));
  /* switch mode means one activity at a time: if a merge produced several running
     timers, keep the most recent and log the earlier ones so no time is lost */
  if(S.settings.switchMode !== false && S.timers.length > 1){
    S.timers.sort((a,b)=>a.start-b.start);
    const keep = S.timers[S.timers.length-1];
    for(let i=0;i<S.timers.length-1;i++){
      const t = S.timers[i], end = S.timers[i+1].start;
      if(end - t.start >= 30000 && !evStarts.has(t.catId+"|"+t.start))
        S.events.push({id:uid(), catId:t.catId, name:"", start:t.start, end, notes:"", mod:Date.now()});
    }
    S.timers = [keep];
  }

let syncState = "idle";       // idle | syncing | ok | error

async function syncNow(silent){
  const cfg = S.settings.sync;
  if(!cfg || !cfg.token) return;
  if(window.__inSync) return;               // never overlap two syncs (avoids races)
  if(inCooldown() && silent) return;        // honor backoff for automatic syncs

  window.__inSync = true; clearTimeout(autoPushTimer); clearTimeout(retryTimer);
  setSyncState("syncing");

    /* CONDITIONAL PULL: send our saved ETag; GitHub replies 304 (nothing new) for free-ish,
       so idle syncs cost almost nothing and don't provoke the rate limit */
    const url = "https://api.github.com/gists/"+cfg.gistId;
    const gh = { Authorization:"Bearer "+cfg.token, Accept:"application/vnd.github+json" };
    const getRes = await fetch(url, { headers: cfg.etag ? {...gh, "If-None-Match":cfg.etag} : gh, cache:"no-store" });

        if(f.truncated){ const r = await fetch(f.raw_url, {cache:"no-store"}); content = await r.text(); }

      const patchRes = await fetch(url, { method:"PATCH", headers:{...gh,"Content-Type":"application/json"},
        body: JSON.stringify({files:{[SYNC_FILE]:{content: JSON.stringify(syncPayload())}}}), cache:"no-store" });
      if(!patchRes.ok){
        let m=""; try{ m=(await patchRes.json()).message||""; }catch(e){}
        const er=new Error("GitHub "+patchRes.status+(m?" — "+m:"")); er.status=patchRes.status; er.ghMessage=m;
        const ra=hget(patchRes,"retry-after"); if(ra) er.retryMs=Number(ra)*1000;

    window.__inSync = false;

    const status = err.status || 0;
    const rateLimited = status===429 || (status===403 && /rate limit|secondary/i.test(err.ghMessage||""));

        cfg.pushedSig = quickSig(syncPayload());
        cfg.lastSync = Date.now(); cfg.lastError = null;
        window.__healing = false; window.__inSync = false;
        syncFailStreak = 0; syncCooldownUntil = 0;

        setSyncState("ok"); renderAll();
        if(!silent) toast("✓ Reconnected the sync file");
        return;
      }catch(e2){ window.__healing = false; err = e2; }
    }
    window.__inSync = false;
    const st2 = err.status || 0;
    /* auth = the token itself is the problem (needs a NEW token); rate/net just back off */
    const auth = st2===401 || (st2===403 && !rateLimited);

    try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){}
    setSyncState("error", auth?"auth":(rateLimited?"rate":"net"));

      /* GitHub's guidance: honor Retry-After if present, else wait ≥60s for a secondary limit.
         Non-rate network errors fall through to capped exponential backoff. */
      let wait = 0;

    }

      st2===401 ? "Token expired or invalid — generate a new one" :
      (st2===403 && !rateLimited) ? "Token is missing the ‘gist’ permission" :
      rateLimited ? "GitHub busy — pausing sync a moment, will resume" :
      "Offline — will retry automatically");
  }
}
async function syncConnect(token){
  token = String(token||"").trim();
  toast("Connecting…");
  try{
    const gistId = await syncConsolidate(token);   // converge on the oldest gist, merge any strays
    S.settings.sync = {token, gistId, lastSync:Date.now(), lastError:null};
    save(); closeSheet();
    updateSyncPill();
    await syncNow(false);
    if(currentView==="settings") renderSettings();
  }catch(err){
    const st2 = err.status || 0;
    toast(
      st2===401 ? "That token is invalid or expired — make a new one" :
      st2===403 ? "Token needs the ‘gist’ scope (or GitHub is rate-limiting)" :
      err.network ? "No connection — check internet and retry" :
      "Couldn’t connect: " + (err.ghMessage || err.message || "unknown"));
  }
}
function fmtSyncAgo(t){
  if(!t) return "never";
  const m = Math.floor((Date.now()-t)/MIN);
  if(m<1) return "just now";
  if(m<60) return m+"m ago";
  if(m<1440) return Math.floor(m/60)+"h ago";
  return Math.floor(m/1440)+"d ago";
}
/* the always-visible header pill — one glance tells you sync is healthy */
function updateSyncPill(){
  const pill = document.getElementById("syncPill");
  if(!pill) return;
  const cfg = S.settings && S.settings.sync;
  if(!cfg){ pill.hidden = true; return; }
  pill.hidden = false;
  let cls="", txt="";
  if(syncState==="syncing"){ cls="syncing"; txt="Syncing…"; }
  else if(syncState==="error" && syncErrKind==="auth"){ cls="err"; txt="Reconnect"; }
  else if(syncState==="error" && syncErrKind==="rate"){ cls="warn"; txt="Paused · resuming"; }
  else if(syncState==="error"){ cls="warn"; txt="Offline · retrying"; }
  else if(!cfg.lastSync){ cls=""; txt="Sync"; }
  else {
    const stale = Date.now()-cfg.lastSync > 25*HOUR;
    cls = stale ? "warn" : "ok";
    txt = "Synced " + fmtSyncAgo(cfg.lastSync);
  }
  pill.className = "syncpill " + cls;
  pill.innerHTML = `<span class="sdot"></span><span class="stxt">${txt}</span>`;
}

   (the next launch will do a full sync anyway). */
function syncPushOnExit(){
  const cfg = S.settings.sync;
  if(!cfg || !cfg.token) return;
  try{
    const body = JSON.stringify({files:{[SYNC_FILE]:{content: JSON.stringify(syncPayload())}}});
    if(body.length > 60000) return;
    fetch("https://api.github.com/gists/"+cfg.gistId, {
      method:"PATCH",
      headers:{Authorization:"Bearer "+cfg.token, Accept:"application/vnd.github+json", "Content-Type":"application/json"},
      body, keepalive:true, cache:"no-store"
    }).catch(()=>{});
  }catch(e){}
}

    dlg.innerHTML = `
      ${opts.icon===false ? "" : `<div class="dicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 7h16M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></div>`}

    <h2>${c?"Edit category":"New category"}</h2>
    <div class="frow"><label>Name</label><input type="text" id="cName" value="${c?esc(c.name):""}" placeholder="e.g. Anki, Clinic, Gym" autocomplete="off"></div>
    <div class="frow"><label>Family</label>
      <select id="cFam">
        ${fams.map(f=>`<option value="${esc(f.name)}" ${f.name===curFam?"selected":""}>${esc(f.name)}</option>`).join("")}
        <option value="__new">＋ New family…</option>
      </select>
      <input type="text" id="cFamNew" placeholder="New family name" autocomplete="off" hidden style="margin-top:8px">
    </div>
    <div class="frow"><label>Color</label><div class="swatches" id="cSw">
      ${[...(SWATCHES.includes(color)?[]:[color]), ...SWATCHES].map(p=>`<button class="sw ${p===color?"on":""}" data-c="${p}" style="background:${p}"></button>`).join("")}
    </div></div>
    <button class="btn" id="cSave">${c?"Save changes":"Add category"}</button>
    ${c?`<button class="btn ghost" id="cArch">${c.archived?"Unarchive":"Archive"}</button>
         <button class="btn red" id="cDel">Delete category & its events</button>`:""}
  `);
  sheet.querySelectorAll("#cSw .sw").forEach(b=>b.addEventListener("click", ()=>{
    color = b.dataset.c;
    sheet.querySelectorAll("#cSw .sw").forEach(x=>x.classList.toggle("on", x===b));
  }));
  $("#cFam").addEventListener("change", ()=>{
    $("#cFamNew").hidden = $("#cFam").value !== "__new";
    if(!$("#cFamNew").hidden) $("#cFamNew").focus();
  });
  $("#cSave").addEventListener("click", ()=>{
    if(!sheetOpen()) return;
    const name = $("#cName").value.trim();
    if(!name) return toast("Give it a name");
    let fam = $("#cFam").value;
    if(fam==="__new"){ fam = $("#cFamNew").value.trim(); if(!fam) return toast("Name the new family"); }
    if(!familyList().some(f=>f.name.toLowerCase()===fam.toLowerCase()))
      S.settings.families.push({name:fam, color});   // new family takes this category's color
    if(c){
      if(c.name!==name){
        remapDeletedKeys(c.name, name);
        c.prevNames = [...new Set([...(c.prevNames||[]), c.name.toLowerCase()])].slice(-12);  // remember old name so the rename syncs across devices
      }
      c.name = name; c.color = color; c.family = fam; c.mod = Date.now();
    }
    else S.categories.push({id:uid(), name, color, family:fam, archived:false, prevNames:[], mod:Date.now()});
    save(); renderAll(); closeSheet();
  });
  if(c){
    $("#cArch").addEventListener("click", ()=>{
      c.archived = !c.archived; c.mod = Date.now(); if(c.archived) stopTimer(c.id, true);
      save(); renderAll(); closeSheet(); toast(c.archived?"Archived":"Unarchived");
    });
    $("#cDel").addEventListener("click", ()=>{
      if(!confirm(`Delete "${c.name}" and all its events?`)) return;
      stopTimer(c.id, true);
      S.deleted.push(...S.events.filter(e=>e.catId===c.id).map(e=>e.id),
                     ...S.goals.filter(g=>g.catId===c.id).map(g=>g.id));
      S.deletedKeys.push(...S.events.filter(e=>e.catId===c.id)
        .flatMap(e=>[c.name.toLowerCase()+"|"+e.start+"|"+e.end, c.id+"|"+e.start+"|"+e.end]));
      S.deletedCats.push(c.name.toLowerCase());
      S.events = S.events.filter(e=>e.catId!==c.id);
      S.goals = S.goals.filter(g=>g.catId!==c.id);
      S.categories = S.categories.filter(x=>x.id!==c.id);
      save(); renderAll(); closeSheet(); toast("Deleted");
    });
  }
  setTimeout(()=>{ if(!c) $("#cName").focus(); }, 350);
}

/* ---- family edit sheet (rename + recolor a whole family) ---- */
function openFamilySheet(name){
  const fam = familyList().find(f=>f.name.toLowerCase()===String(name).toLowerCase())
            || {name, color:familyColor(name)};
  let color = fam.color;
  const members = S.categories.filter(c=>!c.archived && famOf(c).toLowerCase()===name.toLowerCase());
  openSheet(`
    <h2>Edit family</h2>
    <div class="frow"><label>Family name</label><input type="text" id="fName" value="${esc(fam.name)}" autocomplete="off"></div>
    <div class="frow"><label>Family color</label><div class="swatches" id="fSw">
      ${[...(SWATCHES.includes(color)?[]:[color]), ...SWATCHES].map(p=>`<button class="sw ${p===color?"on":""}" data-c="${p}" style="background:${p}"></button>`).join("")}
    </div></div>
    <div class="hint">${members.length} ${members.length===1?"category":"categories"}: ${members.map(c=>esc(c.name)).join(", ")||"none"}. The family color shows on headers and in the weekly review — it doesn't change category colors.</div>
    <button class="btn" id="fSave">Save family</button>
  `);
  sheet.querySelectorAll("#fSw .sw").forEach(b=>b.addEventListener("click", ()=>{
    color = b.dataset.c;
    sheet.querySelectorAll("#fSw .sw").forEach(x=>x.classList.toggle("on", x===b));
  }));
  $("#fSave").addEventListener("click", ()=>{
    if(!sheetOpen()) return;
    const newName = $("#fName").value.trim();
    if(!newName) return toast("Name the family");
    const oldName = fam.name;                     // capture BEFORE mutating the entry
    const reg = S.settings.families;
    let entry = reg.find(f=>f.name.toLowerCase()===oldName.toLowerCase());
    if(!entry){ entry = {name:oldName, color}; reg.push(entry); }
    const renamed = oldName.toLowerCase() !== newName.toLowerCase();
    entry.name = newName; entry.color = color;
    if(renamed){
      /* move every member to the new family name and bump mod so it syncs */
      for(const c of S.categories) if(famOf(c).toLowerCase()===oldName.toLowerCase()){ c.family = newName; c.mod = Date.now(); }
      /* de-dupe if a family with the new name already existed */
      const seen = new Set();
      S.settings.families = reg.filter(f=>{ const k=f.name.toLowerCase(); if(seen.has(k)) return false; seen.add(k); return true; });
    }
    save(); renderAll(); closeSheet(); toast("Family updated");
  });
}

/* ---- event sheet (add past / edit) ---- */
/* type-to-filter category picker, reused by the event and goal sheets. `prefix`
   namespaces the ids: `${prefix}Cat` (hidden) holds the chosen id, `${prefix}CatText`
   is the search box, `${prefix}CatList` the in-flow filtered list, `${prefix}CatDot`
   the color swatch. Build the markup with catComboHTML(), then wire it. */
function catComboHTML(prefix, cats, selId, placeholder){
  const sel = cats.find(c=>c.id===selId) || cats[0] || {id:"",name:"",color:"#8b8f98"};
  return `<div class="combo">
      <div class="comboin-wrap">
        <span class="combo-dot" id="${prefix}CatDot" style="background:${sel.color}"></span>
        <input type="text" id="${prefix}CatText" class="comboin" autocomplete="off" spellcheck="false" placeholder="${esc(placeholder||"Type to search categories…")}" value="${esc(sel.name)}">
      </div>
      <input type="hidden" id="${prefix}Cat" value="${sel.id}">
      <div class="combolist" id="${prefix}CatList" hidden></div>
    </div>`;
}
function wireCatCombo(cats, prefix){
  prefix = prefix || "e";
  const text=$("#"+prefix+"CatText"), hidden=$("#"+prefix+"Cat"), list=$("#"+prefix+"CatList"), dot=$("#"+prefix+"CatDot");
  if(!text||!hidden||!list) return;
  const pick=id=>{ const c=cats.find(x=>x.id===id); if(!c) return;
    hidden.value=c.id; text.value=c.name; if(dot) dot.style.background=c.color; list.hidden=true; };
  const draw=q=>{
    const ql=String(q||"").trim().toLowerCase();
    const ms=cats.filter(c=>c.name.toLowerCase().includes(ql));
    list.innerHTML = ms.length
      ? ms.map(c=>`<button type="button" class="comboitem${c.id===hidden.value?" on":""}" data-id="${c.id}"><span class="cd" style="background:${c.color}"></span><span class="cn">${esc(c.name)}</span>${c.tag?`<span class="cotag">${esc(c.tag)}</span>`:""}</button>`).join("")
      : `<div class="combo-empty">No matches</div>`;
    list.querySelectorAll(".comboitem").forEach(b=>
      b.addEventListener("mousedown", e=>{ e.preventDefault(); pick(b.dataset.id); }));
  };
  text.addEventListener("focus", ()=>{ text.select(); draw(""); list.hidden=false; });
  text.addEventListener("input", ()=>{ draw(text.value); list.hidden=false; });
  text.addEventListener("keydown", e=>{
    if(e.key==="Enter"){ e.preventDefault(); const f=list.querySelector(".comboitem"); if(f && !list.hidden){ pick(f.dataset.id); text.blur(); } }
    else if(e.key==="Escape"){ list.hidden=true; text.blur(); }
  });
  text.addEventListener("blur", ()=>setTimeout(()=>{
    const typed = text.value.trim().toLowerCase();
    const cur = cats.find(x=>x.id===hidden.value);
    if(cur && cur.name.toLowerCase()===typed){ list.hidden=true; return; }  /* selection already matches — keep it (handles same-named family vs category) */
    const exact = cats.find(c=>c.name.toLowerCase()===typed);
    if(exact) pick(exact.id);
    else if(cur) text.value = cur.name;   /* revert display to the real selection */
    list.hidden=true;
  }, 160));
}
function openEventSheet(id, pre){
  const ev = id ? S.events.find(e=>e.id===id) : null;
  const now = Date.now();
  const defStart = ev ? ev.start : (pre ? pre.start : now-HOUR);
  const defEnd   = ev ? ev.end   : (pre ? pre.end   : now);
  const cats = S.categories.filter(c=>!c.archived || (ev && ev.catId===c.id));
  openSheet(`
    <h2>${ev?"Edit event":"Add past event"}</h2>
    <div class="frow"><label>Category</label>${catComboHTML("e", cats, ev?ev.catId:null)}</div>
    <div class="frow"><label>Name <span style="text-transform:none;font-weight:600">(optional)</span></label>
      <input type="text" id="eName" value="${ev?esc(ev.name):""}" placeholder="e.g. Cardio block review"></div>
    <div class="frow"><div class="duo">
      <div><label>Starts</label><input type="datetime-local" id="eStart" value="${toLocalInput(defStart)}"></div>
      <div><label>Ends</label><input type="datetime-local" id="eEnd" value="${toLocalInput(defEnd)}"></div>
    </div></div>
    <div class="frow"><label>Notes</label><textarea id="eNotes" rows="2" placeholder="optional">${ev?esc(ev.notes):""}</textarea></div>
    <button class="btn" id="eSave">${ev?"Save changes":"Add event"}</button>
    ${ev?`<button class="btn red" id="eDel">Delete event</button>`:""}
  `);
  wireCatCombo(cats);
  $("#eSave").addEventListener("click", ()=>{
    if(!sheetOpen()) return;
    const s = new Date($("#eStart").value).getTime();
    const e = new Date($("#eEnd").value).getTime();
    if(isNaN(s)||isNaN(e)) return toast("Set start and end times");
    if(e<=s) return toast("End must be after start");
    const catId = $("#eCat").value || (cats[0]&&cats[0].id);
    if(!catId) return toast("Pick a category");
    const data = {catId, name:$("#eName").value.trim(), start:s, end:e, notes:$("#eNotes").value.trim(), mod:Date.now()};
    if(ev) Object.assign(ev, data);
    else S.events.push({id:uid(), ...data});
    save(); renderAll(); closeSheet(); checkGoalCelebrate();
  });
  if(ev) $("#eDel").addEventListener("click", ()=>{
    askConfirm("Delete this event?", "This removes it from your log everywhere. This can’t be undone.", {ok:"Delete", danger:true})
      .then(yes=>{ if(yes){ deleteEvent(ev.id); closeSheet(); } });
  });
}
/* ---- running-timer sheet: adjust start time, or stop ---- */
function openTimerSheet(catId){
  const t = timerFor(catId);
  if(!t){ closeSheet(); return; }
  openSheet(`
    <h2>Tracking: ${esc(catName(catId))}</h2>
    <div class="frow"><label>Started</label><input type="datetime-local" id="tStart" value="${toLocalInput(t.start)}"></div>
    <div class="hint">Fix when this activity actually began — the running time updates to match.</div>
    <button class="btn" id="tSave">Save start time</button>
    <button class="btn red" id="tStop">Stop &amp; log now</button>
  `);
  $("#tSave").addEventListener("click", ()=>{
    if(!sheetOpen()) return;
    const tt = timerFor(catId); if(!tt){ closeSheet(); return; }
    const s = new Date($("#tStart").value).getTime();
    if(isNaN(s)) return toast("Set a valid time");
    if(s > Date.now()) return toast("Start can’t be in the future");
    if(Date.now()-s > 7*DAY && !confirm("That start is over a week ago — keep it?")) return;
    tt.start = s;
    save(); renderAll(); updateLiveBar(); closeSheet(); toast("Start time updated");
    syncSoon();
  });
  $("#tStop").addEventListener("click", ()=>{ closeSheet(); stopTimer(catId); });
}
/* shared event delete (sheet + swipe) — records rename-proof tombstones so it syncs */
function deleteEvent(id){
  const ev = S.events.find(e=>e.id===id); if(!ev) return;
  S.deleted.push(ev.id);
  S.deletedKeys.push(catName(ev.catId).toLowerCase()+"|"+ev.start+"|"+ev.end);  // name-key
  S.deletedKeys.push(ev.catId+"|"+ev.start+"|"+ev.end);                          // id-key (rename-proof)
  S.events = S.events.filter(x=>x.id!==id);
  save(); renderAll(); toast("Event deleted");
}

/* ---- goal sheet ---- */
function openGoalSheet(id){
  const g = id ? S.goals.find(x=>x.id===id) : null;
  let period = g ? g.period : "day";
  const tgt = g ? g.target : 60;
  /* the picker offers whole families (tagged) plus individual categories.
     family option ids are encoded "fam:<name>"; category ids are the raw catId. */
  const catItems = activeCats().map(c=>({id:c.id, name:c.name, color:c.color}));
  const famItems = [...new Set(activeCats().map(c=>famOf(c)))]
    .sort((a,b)=>familyRank(a)-familyRank(b))
    .map(name=>({id:"fam:"+name, name, color:familyColor(name), tag:"family"}));
  const items = [...famItems, ...catItems];
  const selId = g ? (g.fam ? "fam:"+g.fam : g.catId) : (catItems[0] && catItems[0].id);
  openSheet(`
    <h2>${g?"Edit goal":"New goal"}</h2>
    <div class="frow"><label>Category or family</label>${catComboHTML("g", items, selId, "Type to search categories or families…")}</div>
    <div class="frow"><label>Period</label><div class="seg mini" id="gSeg">
      ${Object.entries(PERIODS).map(([k,l])=>`<button data-p="${k}" class="${period===k?"on":""}">${l}</button>`).join("")}
    </div></div>
    <div class="frow"><label>Target</label><div class="duo">
      <input type="number" id="gH" min="0" max="200" inputmode="numeric" value="${Math.floor(tgt/60)}" placeholder="hours">
      <input type="number" id="gM" min="0" max="59" inputmode="numeric" value="${tgt%60}" placeholder="minutes">
    </div><div class="hint">hours · minutes</div></div>
    <button class="btn" id="gSave">${g?"Save changes":"Add goal"}</button>
    ${g?`<button class="btn red" id="gDel">Delete goal</button>`:""}
  `);
  wireCatCombo(items, "g");
  sheet.querySelectorAll("#gSeg button").forEach(b=>b.addEventListener("click", ()=>{
    period = b.dataset.p;
    sheet.querySelectorAll("#gSeg button").forEach(x=>x.classList.toggle("on", x===b));
  }));
  $("#gSave").addEventListener("click", ()=>{
    if(!sheetOpen()) return;
    const val = $("#gCat").value || (items[0] && items[0].id);
    if(!val) return toast("Pick a category or family");
    const ref = val.slice(0,4)==="fam:" ? {fam:val.slice(4), catId:null} : {catId:val, fam:null};
    const target = (Number($("#gH").value)||0)*60 + (Number($("#gM").value)||0);
    if(!(target > 0)) return toast("Set a positive target time");
    if(g) Object.assign(g, {...ref, period, target});
    else S.goals.push({id:uid(), ...ref, period, target});
    save(); renderGoals(); closeSheet();
  });
  if(g) $("#gDel").addEventListener("click", ()=>{
    S.deleted.push(g.id);
    S.goals = S.goals.filter(x=>x.id!==g.id);
    save(); renderGoals(); closeSheet(); toast("Goal deleted");
  });
}

/* ============================== URL actions (Shortcuts) ============================== */
function handleURLActions(){
  const p = new URLSearchParams(location.search);
  if(![...p.keys()].length) return;
  const findCat = n => S.categories.find(c=>c.name.toLowerCase()===String(n).toLowerCase());
  let acted = false;
  if(p.has("start")){
    const c = findCat(p.get("start"));
    if(c && c.archived) toast(c.name + " is archived — unarchive it first");
    else if(c){ startTimer(c.id); toast("▶ " + c.name + " started"); acted = true; }
    else toast("No category: " + p.get("start"));
  }
  if(p.has("stop")){
    const val = p.get("stop");
    if(val==="all" || val===""){ [...S.timers].forEach(t=>stopTimer(t.catId)); acted = true; }
    else{ const c = findCat(val); if(c){ stopTimer(c.id); acted = true; } else toast("No category: " + val); }
  }
  if(p.has("toggle")){
    const c = findCat(p.get("toggle"));
    if(c && c.archived && !timerFor(c.id)) toast(c.name + " is archived — unarchive it first");
    else if(c){ toggleTimer(c.id); toast((timerFor(c.id)?"▶ ":"■ ") + c.name); acted = true; }
    else toast("No category: " + p.get("toggle"));
  }
  history.replaceState(null,"",location.pathname);
  return acted;
}

/* ============================== navigation & init ============================== */
let currentView = "track";
const TITLES = {track:"Track", log:"Events Log", stats:"Stats", goals:"Goals", settings:"Settings"};
const RENDER = {track:renderTrack, log:renderLog, stats:renderStats, goals:renderGoals, settings:renderSettings};

function switchView(v){
  window.scrollTo(0,0);          /* reset BEFORE the swap — avoids iOS fixed-bar misplacement */
  currentView = v;
  document.querySelectorAll(".view").forEach(x=>x.classList.toggle("on", x.id==="view-"+v));
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on", b.dataset.v===v));
  $("#viewTitle").textContent = TITLES[v];
  const hb = $("#headerBtn");
  hb.style.visibility = (v==="track"||v==="settings") ? "hidden" : "visible";
  RENDER[v]();
  window.scrollTo(0,0);
}
$("#tabs").addEventListener("click", e=>{
  const b = e.target.closest("button"); if(b) switchView(b.dataset.v);
});
$("#headerBtn").addEventListener("click", ()=>{
  if(currentView==="log"||currentView==="stats") openEventSheet(null);
  else if(currentView==="goals") openGoalSheet(null);
});
function renderAll(){ RENDER[currentView](); updateLiveBar(); }

/* theme */
const mq = window.matchMedia("(prefers-color-scheme: dark)");
function applyTheme(){
  const t = S.settings.theme==="auto" ? (mq.matches?"dark":"light") : S.settings.theme;
  document.documentElement.setAttribute("data-theme", t);
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute("content", t==="dark" ? "#0f1115" : "#f2f2f7");
}
mq.addEventListener("change", ()=>{ if(S.settings.theme==="auto") applyTheme(); });

/* keep multiple open tabs/windows in sync */
window.addEventListener("storage", e=>{
  if(e.key===LS_KEY && e.newValue){
    try{ S = JSON.parse(e.newValue); renderAll(); }catch(err){}
  }
});
/* recompute goal periods / "Today" labels when returning to the app */
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) renderAll(); });

/* tapping the header pill = manual sync (also how you clear an error) */
document.getElementById("syncPill").addEventListener("click", ()=>{
  if(S.settings.sync) syncNow(false);
});

/* boot */
ensureFamilies();     /* registry + per-category family assignment */
save();               /* persist seed / migrations immediately */
applyTheme();
handleURLActions();
switchView("track");
updateSyncPill();
updateLiveBar();
/* gentle backup nudge — localStorage can be evicted if the site goes unused */
if(S.events.length > 25 && (!S.settings.lastBackup || Date.now()-S.settings.lastBackup > 14*DAY)){
  setTimeout(()=>toast("💾 Tip: Settings → Export keeps your data safe"), 1800);
}
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
/* auto-sync: shortly after launch, when returning to the app, and when leaving it.
   Listeners are always attached (not gated on sync being configured at load), so
   connecting sync mid-session works immediately without a reload. */
if(S.settings.sync) setTimeout(()=>syncNow(true), 1500);
document.addEventListener("visibilitychange", ()=>{
  if(!S.settings.sync || inCooldown()) return;
  if(!document.hidden){
    /* returning: full merge sync (throttled) */
    if(!S.settings.sync.lastSync || Date.now()-S.settings.sync.lastSync > 5*MIN) syncNow(true);
  } else {
    /* leaving/backgrounding: push local changes so the other device sees them */
    syncPushOnExit();
  }
});
/* hard close (swipe away / tab close): last-chance keepalive push */
window.addEventListener("pagehide", ()=>{ if(!inCooldown()) syncPushOnExit(); });
/* periodic safety-net sync (catches the other device's changes while sitting idle-open) */
setInterval(()=>{
  if(S.settings.sync && !document.hidden && navigator.onLine!==false && !window.__inSync && !inCooldown()
     && (!S.settings.sync.lastSync || Date.now()-S.settings.sync.lastSync > 3*MIN)) syncNow(true);
}, 60000);
/* connectivity returns → clear the backoff (it was for a dropped network) and sync now.
   A rate-limit is NOT a connectivity problem, so leave its cooldown in place. */
window.addEventListener("online", ()=>{
  if(!S.settings.sync) return;
  const le = S.settings.sync.lastError;
  if(le && le.rate) return;
  syncCooldownUntil = 0; syncFailStreak = 0;
  syncNow(true);
});
window.addEventListener("offline", ()=>{ if(S.settings.sync && syncState!=="syncing") setSyncState("error","net"); });
/* keep the pill's "x min ago" text fresh */
setInterval(updateSyncPill, 30000);
</script>
